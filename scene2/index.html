<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Pura X · AI通知</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
<style>
  :root {
    --canvas-w: 1600px;
    --canvas-h: 2560px;
    --ink: #ffffff;
    --ink-2: rgba(255,255,255,0.72);
    --ink-3: rgba(255,255,255,0.45);
    --ink-4: rgba(255,255,255,0.22);
    --hair: rgba(255,255,255,0.08);
    --accent: oklch(0.85 0.16 175);   /* cyan-green */
    --accent-2: oklch(0.78 0.18 165);
    --accent-3: oklch(0.92 0.10 180);
    --warn: oklch(0.85 0.16 75);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: "Inter","Noto Sans SC", system-ui, -apple-system, "PingFang SC", sans-serif;
    color: var(--ink);
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; background: #000; overflow: hidden; }
  #canvas {
    position: absolute;
    left: 50%; top: 50%;
    width: var(--canvas-w);
    height: var(--canvas-h);
    transform-origin: center center;
    overflow: hidden;
    background: #0a0e0c;
  }
  #app { position: absolute; inset: 0; }
</style>
</head>
<body style="font-family: -apple-system; background-color: rgb(0, 0, 0)">
<div id="stage">
  <div id="canvas">
    <div id="app"></div>
  </div>
</div>

<script>
  function fit() {
    const cv = document.getElementById('canvas');
    const sx = window.innerWidth / 1600;
    const sy = window.innerHeight / 2560;
    const s = Math.min(sx, sy);
    cv.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>

<script type="module" src="./main.jsx"></script>
</body>
</html>
