<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Healthcare | AI Opening</title>
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <div class="viewport-shell">
      <div class="stage-frame" id="stageFrame">
        <main class="device-stage" id="deviceStage" data-phase="aod" aria-label="Healthcare AI opening">
          <section class="aod-layer" aria-label="Always-on display clock">
            <div class="clock-wrap" id="clockWrap">
              <div class="clock-time" id="clockTime">00:00</div>
            </div>
          </section>

          <section class="agent-layer" id="agentLayer" aria-hidden="true">
            <div class="orb-shell" id="orbShell">
              <div class="orb-aura"></div>
              <div class="orb-ring"></div>
              <div class="orb-core"></div>
              <div class="orb-liquid"></div>
              <div class="orb-highlight"></div>
            </div>

            <div class="healthcare-chip" id="healthcareChip">
              <p class="healthcare-kicker">Healthcare AI</p>
              <p class="healthcare-title">Skin Health Intelligence</p>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
