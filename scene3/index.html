<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Pura X · AI选图</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
<style>
  :root {
    --canvas-w: 1600px;
    --canvas-h: 2560px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: "Inter","Noto Sans SC", system-ui, -apple-system, "PingFang SC", sans-serif;
    color: #fff;
    overflow: hidden;
  }
  #stage { position: fixed; inset: 0; background: #000; overflow: hidden; }
  #canvas {
    position: absolute;
    left: 50%; top: 50%;
    width: var(--canvas-w);
    height: var(--canvas-h);
    transform-origin: center center;
    overflow: hidden;
    background: #f5f5f5;
  }
  #app { position: absolute; inset: 0; }
</style>
</head>
<body style="font-family: -apple-system; background-color: rgb(0,0,0)">
<div id="stage">
  <div id="canvas">
    <div id="app"></div>
  </div>
</div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#0b1220"/>
        <stop offset="100%" stop-color="#1a1240"/>
      </linearGradient>
      <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="oklch(0.92 0.18 250)"/>
        <stop offset="50%" stop-color="oklch(0.78 0.22 270)"/>
        <stop offset="100%" stop-color="oklch(0.85 0.18 320)"/>
      </linearGradient>
    </defs>
    <rect width="200" height="200" rx="32" fill="url(#bg)"/>
    <ellipse cx="100" cy="100" rx="58" ry="42" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round" transform="rotate(-12 100 100)"/>
    <circle cx="100" cy="100" r="14" fill="#fff" opacity="0.95"/>
    <circle cx="100" cy="100" r="6" fill="oklch(0.78 0.22 270)"/>
  </svg>
</template>

<script>
  function fit() {
    const cv = document.getElementById('canvas');
    const sx = window.innerWidth / 1600;
    const sy = window.innerHeight / 2560;
    const s = Math.min(sx, sy);
    cv.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>

<script type="module" src="./main.jsx"></script>
</body>
</html>
