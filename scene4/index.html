<link rel="stylesheet" href="styles.css" />
<style>
  :root { --canvas-w: 1600px; --canvas-h: 2560px; --ink: #ffffff; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { width: 100%; height: 100%; background: #000; font-family: "Inter", system-ui, -apple-system, "PingFang SC", sans-serif; color: var(--ink); overflow: hidden; }
  #stage { position: fixed; inset: 0; background: #000; overflow: hidden; }
  #canvas { position: absolute; left: 50%; top: 50%; width: var(--canvas-w); height: var(--canvas-h); transform-origin: center center; overflow: hidden;
    background:
      radial-gradient(ellipse 90% 70% at 78% 12%, oklch(0.32 0.12 280 / 0.85), transparent 60%),
      radial-gradient(ellipse 80% 60% at 18% 88%, oklch(0.28 0.10 220 / 0.75), transparent 60%),
      linear-gradient(160deg, oklch(0.13 0.04 270) 0%, oklch(0.08 0.025 240) 60%, oklch(0.05 0.02 230) 100%);
  }
  .stars { position: absolute; inset: 0; pointer-events: none; opacity: 0.35;
    background-image:
      radial-gradient(1px 1px at 12% 22%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 71% 14%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 35% 71%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 88% 64%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 56% 39%, #fff 50%, transparent 51%);
  }
  #app { position: absolute; inset: 0; }
</style>
</head>
<body>
<div id="stage"><div id="canvas"><div class="stars"></div><div id="app"></div></div></div>

<script type="module" src="./main.jsx"></script>

<script>
  function fit() {
    const cv = document.getElementById('canvas');
    const sx = window.innerWidth / 1600;
    const sy = window.innerHeight / 2560;
    const s = Math.min(sx, sy);
    cv.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>

function AppTile({ app, size=220 }) {
  const isLight = app.tone === '#FFFFFF';
  return (
    <div className="app">
      <div className="app-tile" style={{ width:size, height:size, background: app.tone, boxShadow: isLight ? '0 8px 22px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.8)' : undefined }}>
        <div className="app-tile-glow" />
        <div className="app-tile-glyph" style={{ color: isLight ? '#1F2937' : '#fff' }}>
          <Glyph id={app.glyph} color={app.tone}/>
        </div>
      </div>
      <div className="app-name">{app.name}</div>
    </div>
  );
}

}

// Hotels rail with an automatic ping-pong demo (mimics a finger swiping
// through the cards). Stops the moment the user interacts.
function HotelsRail({ items, stopDown }) {
  const railRef = React.useRef(null);
  const idxRef = React.useRef(0);
  const dirRef = React.useRef(1);
  const stoppedRef = React.useRef(false);
  const timerRef = React.useRef(null);
  const [activeIdx, setActiveIdx] = React.useState(0);
  const [showCue, setShowCue] = React.useState(true);

  React.useEffect(() => {
    const rail = railRef.current;
    if (!rail) return;

    const stepTo = (i) => {
      const cardEl = rail.querySelector('.hotel-card');
      if (!cardEl) return;
      const cardW = cardEl.offsetWidth + 24; // gap = 24
      rail.scrollTo({ left: i * cardW, behavior: 'smooth' });
      setActiveIdx(i);
    };

    const tick = () => {
      if (stoppedRef.current) return;
      let next = idxRef.current + dirRef.current;
      if (next >= items.length) { dirRef.current = -1; next = items.length - 2; }
      else if (next < 0)         { dirRef.current = 1;  next = 1; }
      idxRef.current = next;
      stepTo(next);
      timerRef.current = setTimeout(tick, 2400);
    };

    // Kick off demo after a short pause so user notices the rail.
    timerRef.current = setTimeout(tick, 1100);

    const stopDemo = () => {
      stoppedRef.current = true;
      setShowCue(false);
      clearTimeout(timerRef.current);
    };
    rail.addEventListener('pointerdown', stopDemo, { once: true });
    rail.addEventListener('wheel', stopDemo, { once: true, passive: true });

    return () => {
      stoppedRef.current = true;
      clearTimeout(timerRef.current);
      rail.removeEventListener('pointerdown', stopDemo);
      rail.removeEventListener('wheel', stopDemo);
    };
  }, [items.length]);

  return (
    <React.Fragment>
      <div className="hotels-rail-wrap">
        <div className="hotels-rail"
             ref={railRef}
             onMouseDown={stopDown}
             onTouchStart={stopDown}>
          {items.map((h, i) => (
            <div key={h.name} className="hotel-card"
                 style={{ animationDelay: `${i * 90 + 200}ms` }}>
              <div className="hotel-image" style={{ background: h.grad }}>
                <div className="hotel-image-deco" data-deco={h.deco} />
                <div className="hotel-image-shine" />
                <div className="hotel-image-area">{h.area}</div>
                <div className="hotel-image-rating">
                  <StarIcon /> <span>{h.rating}</span>
                </div>
                <div className="hotel-image-chip">{h.chip}</div>
              </div>
              <div className="hotel-info">
                <div className="hotel-name">{h.name}</div>
                <div className="hotel-meta">
                  <span>{h.badge}</span>
                  <span className="dotsep">·</span>
                  <span>{h.reviews} 条评价</span>
                </div>
                <div className="hotel-info-bot">
                  <div className="hotel-price">
                    <span className="hp-num">{h.price}</span>
                    <span className="hp-sub">{h.sub}</span>
                  </div>
                  <button className="hotel-book" onClick={stopDown}>预订</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* pagination dots tracking the active card */}
      <div className="hotels-dots">
        {items.map((_, i) => (
          <span key={i} className={"hd-dot" + (i === activeIdx ? " active" : "")} />
        ))}
      </div>
    </React.Fragment>
  );
}

function AICompanion({ progress, open, onClose, onPointerDown,
                       aiState, onOrbPress,
                       expandedAirline, onCardClick }) {
  const t = open ? 1 : progress;
  const translate = (1 - t) * 100;
  const overlayClass = "ai-bar-overlay" + (t > 0.05 ? " in" : "");
  const stopDown = (e) => { e.stopPropagation(); };

  // Derived flags
  const showUserMsg = aiState === 'thinking' || aiState === 'replied' || aiState === 'flights';
  const showAiReply = aiState === 'replied' || aiState === 'flights';
  const expanded    = aiState === 'flights';
  const flightsVisible = aiState === 'flights';

  // orb modifier classes
  const orbClass = "ai-orb"
    + (aiState === 'listening' ? ' pressed listening' : '')
    + (aiState === 'thinking'  ? ' thinking' : '')
    + (aiState === 'replied' || aiState === 'flights' ? ' replied' : '');

  const idleHint = aiState === 'idle' ? '点击或按住说话' :
                   aiState === 'listening' ? '正在聆听…' :
                   aiState === 'thinking'  ? '正在思考…' :
                   '继续说话';

  return (
    <React.Fragment>
      <div className={overlayClass}
           style={{ background: `rgba(0,0,0,${(t * 0.32).toFixed(3)})` }}
           onClick={onClose} />

      <div className={"ai-bar" + (expanded ? " expanded" : "")}
           style={{ transform: `translateX(${translate}%)` }}
           onMouseDown={onPointerDown}
           onTouchStart={onPointerDown}>

        <button className="ai-bar-close"
                onMouseDown={stopDown}
                onTouchStart={stopDown}
                onClick={onClose}
                aria-label="关闭">
          <CloseIcon />
        </button>

        {/* TOP: hint card OR initial recognize-screen action — only when idle */}
        {aiState === 'idle' && (
          <React.Fragment>
            <div className="ai-bar-hint">
              当前页面需要手动<br/>触发识屏
            </div>
            <div className="ai-bar-action">
              <EyeIcon />
              <span>识别屏幕</span>
            </div>
          </React.Fragment>
        )}

        {/* CONVERSATION area — appears once user has talked */}
        {(showUserMsg || showAiReply) && (
          <div className="ai-bar-chat">
            {showUserMsg && (
              <div className="chat-bubble user-bubble">
                帮我买一张去北京的机票

            {showAiReply && (
              <div className="chat-bubble ai-bubble">
                <span className="ai-bubble-tag">AI</span>
                好的，正在帮你查询机票
              </div>
            )}

        )}

        {/* FLIGHTS panel — only visible when expanded */}
        {expanded && (
          <div className="flights-panel">
            <div className="flights-head">
              <div>
                <div className="flights-title">为你找到 {FLIGHTS.length} 个航班</div>
                <div className="flights-sub">深圳 SZX → 北京 PEK · 5 月 15 日 · 周五</div>

            <div className="flights-list">
              {FLIGHTS.map((f, i) => (
                <FlightCard key={f.airline}
                            f={f} idx={i}

        <div className="ai-bar-spacer" />

        <div className="ai-bar-voice">
          <div className={orbClass}

}

// Scene 4 main app:
//   1. Desktop renders immediately (same as scene1).
//   2. After 4 seconds, AI light frame fades in around the edges.
//   3. Swipe right-to-left to slide the AI companion bar in.
//   4. Tap the voice orb → press animation + simulated dialogue:
//        - user: "帮我买一张去北京的机票"
//        - AI:  "好的，正在帮你查询机票"
//      then bar widens to the left and reveals flight cards.

const { useState: aUseState, useEffect: aUseEffect, useRef: aUseRef, useCallback: aUseCallback } = React;

function App() {
  const [lightOn, setLightOn] = aUseState(false);
  const [barOpen, setBarOpen] = aUseState(false);
  const [barProgress, setBarProgress] = aUseState(0); // 0..1
  // aiState: 'idle' | 'listening' | 'thinking' | 'replied' | 'flights'
  const [aiState, setAiState] = aUseState('idle');
  const [expandedAirline, setExpandedAirline] = aUseState(null);
  const aiTimers = aUseRef([]);
  const dragRef = aUseRef({ active: false, startX: 0, startProgress: 0, moved: false });

  // Trigger AI light frame after 4 seconds
  aUseEffect(() => {
    const id = setTimeout(() => setLightOn(true), 4000);
    return () => clearTimeout(id);
  }, []);

  const animateTo = aUseCallback((from, to, dur = 420) => {
    const start = performance.now();
    const opening = to > from;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      const eased = opening
        ? 1 - Math.pow(1 - t, 3)
        : (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);
      const v = from + (to - from) * eased;
      setBarProgress(v);
      if (t < 1) requestAnimationFrame(tick);
      else setBarOpen(to >= 1);
    };
    requestAnimationFrame(tick);
  }, []);

  const onPointerDown = aUseCallback((e) => {
    if (!lightOn) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    dragRef.current = { active: true, startX: x, startProgress: barOpen ? 1 : barProgress, moved: false };
  }, [lightOn, barOpen, barProgress]);

  const onPointerMove = aUseCallback((e) => {
    if (!dragRef.current.active) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const dx = x - dragRef.current.startX;
    if (Math.abs(dx) > 4) dragRef.current.moved = true;
    const vw = window.innerWidth;
    const delta = -dx / (vw * 0.45);
    let p = dragRef.current.startProgress + delta;
    p = Math.max(0, Math.min(1, p));
    setBarProgress(p);
    if (p >= 1) setBarOpen(true);
    if (p <= 0) setBarOpen(false);
  }, []);

  const onPointerUp = aUseCallback(() => {
    if (!dragRef.current.active) return;
    const moved = dragRef.current.moved;
    dragRef.current.active = false;
    if (!moved) return;
    setBarProgress(p => {
      const target = p > 0.4 ? 1 : 0;
      const dur = target === 1 ? 420 : 520;
      animateTo(p, target, dur);
      return p;
    });
  }, [animateTo]);

  aUseEffect(() => {
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchmove', onPointerMove, { passive: true });
    window.addEventListener('touchend', onPointerUp);
    return () => {
      window.removeEventListener('mousemove', onPointerMove);
      window.removeEventListener('mouseup', onPointerUp);
      window.removeEventListener('touchmove', onPointerMove);
      window.removeEventListener('touchend', onPointerUp);
    };
  }, [onPointerMove, onPointerUp]);

  // ---- AI dialogue choreography ----
  const clearAiTimers = () => {
    aiTimers.current.forEach(t => clearTimeout(t));
    aiTimers.current = [];
  };

  const onOrbPress = aUseCallback(() => {
    if (aiState !== 'idle') return;
    clearAiTimers();
    setAiState('listening');

    // 800ms later, user message lands
    aiTimers.current.push(setTimeout(() => setAiState('thinking'), 1100));
    // 1900ms later, AI reply lands
    aiTimers.current.push(setTimeout(() => setAiState('replied'), 2300));
    // 3200ms later, expand bar + show flights
    aiTimers.current.push(setTimeout(() => setAiState('flights'), 3500));
  }, [aiState]);

  const closeBar = aUseCallback(() => {
    clearAiTimers();
    animateTo(barOpen ? 1 : barProgress, 0, 540);
    // reset AI state shortly after close completes
    setTimeout(() => { setAiState('idle'); setExpandedAirline(null); }, 600);
  }, [animateTo, barOpen, barProgress]);

  const onCardClick = aUseCallback((flight) => {
    // Only the recommended card is interactive — toggle its expansion.
    if (flight.tag !== '推荐') return;
    setExpandedAirline(prev => prev === flight.airline ? null : flight.airline);
  }, []);

  return (
    <div className="app-root">
      <window.Desktop />

      <window.LightFrame visible={lightOn} />

      <div className={"swipe-hint" + (lightOn && barProgress < 0.05 ? " in" : "")}>
        <div className="swipe-hint-arrow"></div>
        <div className="swipe-hint-text">向左滑出 AI</div>
      </div>

      <window.AICompanion
        open={barOpen}
        progress={barProgress}
        onClose={closeBar}
        onPointerDown={onPointerDown}
        aiState={aiState}
        onOrbPress={onOrbPress}
        expandedAirline={expandedAirline}
        onCardClick={onCardClick}
      />

      {lightOn && barProgress < 0.05 && (
        <div className="drag-zone-right"
             onMouseDown={onPointerDown}
             onTouchStart={onPointerDown} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
