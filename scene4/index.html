<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Pura X · AI陪伴</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
<style>
  :root { --canvas-w: 1600px; --canvas-h: 2560px; --ink: #ffffff; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body { width: 100%; height: 100%; background: #000; font-family: "Inter", system-ui, -apple-system, "PingFang SC", sans-serif; color: var(--ink); overflow: hidden; }
  #stage { position: fixed; inset: 0; background: #000; overflow: hidden; }
  #canvas { position: absolute; left: 50%; top: 50%; width: var(--canvas-w); height: var(--canvas-h); transform-origin: center center; overflow: hidden;
    background:
      radial-gradient(ellipse 90% 70% at 78% 12%, oklch(0.32 0.12 280 / 0.85), transparent 60%),
      radial-gradient(ellipse 80% 60% at 18% 88%, oklch(0.28 0.10 220 / 0.75), transparent 60%),
      linear-gradient(160deg, oklch(0.13 0.04 270) 0%, oklch(0.08 0.025 240) 60%, oklch(0.05 0.02 230) 100%);
  }
  .stars { position: absolute; inset: 0; pointer-events: none; opacity: 0.35;
    background-image:
      radial-gradient(1px 1px at 12% 22%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 71% 14%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 35% 71%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 88% 64%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 56% 39%, #fff 50%, transparent 51%);
  }
  #app { position: absolute; inset: 0; }
</style>
</head>
<body>
<div id="stage"><div id="canvas"><div class="stars"></div><div id="app"></div></div></div>

<script type="module" src="./main.jsx"></script>

<script>
  function fit() {
    const cv = document.getElementById('canvas');
    const sx = window.innerWidth / 1600;
    const sy = window.innerHeight / 2560;
    const s = Math.min(sx, sy);
    cv.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>


</body>
</html>
