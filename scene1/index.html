<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Pura X · Scene 1 · AI 任务通知栏</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  :root {
    --canvas-w: 1600px;
    --canvas-h: 2560px;
    --ink: #ffffff;
    --ink-2: rgba(255,255,255,0.72);
    --ink-3: rgba(255,255,255,0.45);
    --ink-4: rgba(255,255,255,0.22);
    --hair: rgba(255,255,255,0.08);
    --accent: oklch(0.82 0.14 195);
    --accent-2: oklch(0.72 0.18 290);
    --warn: oklch(0.85 0.16 75);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: "Inter", system-ui, -apple-system, "PingFang SC", sans-serif;
    color: var(--ink);
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    background: #000;
    overflow: hidden;
  }
  #canvas {
    position: absolute;
    left: 50%; top: 50%;
    width: var(--canvas-w);
    height: var(--canvas-h);
    transform-origin: center center;
    overflow: hidden;
    background:
      radial-gradient(ellipse 90% 70% at 78% 12%, oklch(0.32 0.12 280 / 0.85), transparent 60%),
      radial-gradient(ellipse 80% 60% at 18% 88%, oklch(0.28 0.10 220 / 0.75), transparent 60%),
      radial-gradient(ellipse 60% 55% at 52% 50%, oklch(0.22 0.06 260 / 0.5), transparent 70%),
      linear-gradient(160deg, oklch(0.13 0.04 270) 0%, oklch(0.08 0.025 240) 60%, oklch(0.05 0.02 230) 100%);
  }
  /* faint stars */
  .stars { position: absolute; inset: 0; pointer-events: none; opacity: 0.35;
    background-image:
      radial-gradient(1px 1px at 12% 22%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 71% 14%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 35% 71%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 88% 64%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 56% 39%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 23% 91%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 81% 33%, #fff 50%, transparent 51%);
  }

  #app { position: absolute; inset: 0; }

  /* App root mount goes inside #canvas via React */
</style>
</head>
<body>
<div id="stage">
  <div id="canvas">
    <div class="stars"></div>
    <div id="app"></div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  // Scale canvas to viewport (letterbox)
  function fit() {
    const cv = document.getElementById('canvas');
    const sx = window.innerWidth / 1600;
    const sy = window.innerHeight / 2560;
    const s = Math.min(sx, sy);
    cv.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();
</script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>
<script type="text/babel" src="notification-shade.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
