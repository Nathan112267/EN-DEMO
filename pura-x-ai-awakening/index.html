        if (pinchActive && !mainHandRuntime.pinchClosed) {
          mainHandRuntime.pinchStartedAt = timestamp;
          mainHandRuntime.pinchLatched = false;
        }

        if (
          pinchActive &&
          mainHandRuntime.pinchStartedAt &&
          !mainHandRuntime.pinchLatched &&
          timestamp - mainHandRuntime.pinchStartedAt >= DEMO_CONFIG.handGesture.pinchHoldMs
        ) {
          pinchConfirmed = true;
          mainHandRuntime.pinchLatched = true;
        }

        if (!pinchActive) {
          mainHandRuntime.pinchClosed = false;
          mainHandRuntime.pinchStartedAt = 0;
          mainHandRuntime.pinchLatched = false;
        } else {
          mainHandRuntime.pinchClosed = true;
        }

        mainHandRuntime.missingFrames = 0;
        mainHandRuntime.lastCenterX = palmCenter.x;
        mainHandRuntime.lastTimestamp = timestamp;
        mainHandRuntime.present = true;

        return {
          supported: true,
          present: true,
          centerX: palmCenter.x,
          velocityX,
          swipeDirection,
          pinchActive,
          pinchConfirmed,
        };
      }

      async function initMainHandLandmarker() {
        if (state.mainHandLandmarker) {
          state.handPipelineMode = "main";
          state.handState.supported = true;
          return;
        }

        const vision = await FilesetResolver.forVisionTasks(DEMO_CONFIG.mediaPipe.wasmUrl);
        state.mainHandLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: DEMO_CONFIG.mediaPipe.handModelUrl,
            delegate: "CPU",
          },
          runningMode: "VIDEO",
          numHands: 1,
          minHandDetectionConfidence: 0.3,
          minHandPresenceConfidence: 0.3,
          minTrackingConfidence: 0.3,
        });
        resetMainHandRuntime();
        state.handPipelineMode = "main";
        state.handState.supported = true;
      }

      function disposeMainHandLandmarker() {
        if (state.mainHandLandmarker && typeof state.mainHandLandmarker.close === "function") {
          try {
            state.mainHandLandmarker.close();
          } catch (_error) {
          }
        }
        state.mainHandLandmarker = null;
        state.mainHandBusy = false;
        resetMainHandRuntime();
        if (state.handPipelineMode === "main") {
          state.handPipelineMode = "";
        }
      }

      async function ensureHandGesturePipeline() {
        if (RUNTIME_TUNING.coarsePointer) {
          if (state.handPipelineMode === "main" && state.mainHandLandmarker) {
            return true;
          }

          try {
            await initMainHandLandmarker();
            return true;
          } catch (error) {
            console.warn("Main-thread hand detection unavailable.", error);
            state.handPipelineMode = "";
            state.handState.supported = false;
            return false;
          }
        }

        if (state.handPipelineMode === "worker" && state.workerReady && state.handState.supported) {
          return true;
        }
        if (state.handPipelineMode === "main" && state.mainHandLandmarker) {
          return true;
        }

        try {
          await initMainHandLandmarker();
          return true;
        } catch (error) {
          console.warn("Main-thread hand detection unavailable.", error);
          state.handPipelineMode = "";
          state.handState.supported = false;
          return false;
        }
      }

      function getCoffeeByIndex(index) {
        return DEMO_CONFIG.coffeeOptions[index] || DEMO_CONFIG.coffeeOptions[0];
      }

      function getCoffeeIndexById(coffeeId) {
        return DEMO_CONFIG.coffeeOptions.findIndex((coffee) => coffee.id === coffeeId);
      }

      function getConfirmedCoffee() {
        const confirmedIndex = getConfirmedCoffeeIndex();
        return getCoffeeByIndex(confirmedIndex >= 0 ? confirmedIndex : state.selectedCoffeeIndex);
      }

      function getCoffeeVisualMarkup(coffeeId) {
        const liquidColors = {
          americano: "#3E2619",
          latte: "#C7916B",
          "flat-white": "#B68462",
        };

        const liquidColor = liquidColors[coffeeId] || liquidColors.americano;

        return `
          <span class="coffee-card-visual" aria-hidden="true">
            <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
              <ellipse cx="80" cy="134" rx="28" ry="7" fill="#05070E" fill-opacity="0.28"/>
              <path d="M57 33c-3 5-3 11 0 16" stroke="#98FFF3" stroke-width="4" stroke-linecap="round" stroke-opacity="0.72"/>
              <path d="M74 28c-3 6-3 14 0 20" stroke="#D9FBF8" stroke-width="4" stroke-linecap="round" stroke-opacity="0.58"/>
              <path d="M43 54h44c17 0 29 12 29 29v19c0 16-12 28-28 28H72c-16 0-28-12-28-28V61c0-4 3-7 7-7Z" fill="#EEF5FF" fill-opacity="0.96"/>
              <path d="M48 64h44c11 0 20 9 20 20v16c0 14-10 24-24 24H72c-14 0-24-10-24-24V68c0-2 2-4 4-4Z" fill="${liquidColor}"/>
              <path d="M116 68h8c11 0 20 9 20 20s-9 20-20 20h-8" stroke="#EEF5FF" stroke-width="7" stroke-linecap="round"/>
              <path d="M56 70h37" stroke="#A8FFF7" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.46"/>
            </svg>
          </span>
        `;
      }

      function resolveCoffeeIndexFromHandX(centerX) {
        const normalizedX = clamp(Number.isFinite(centerX) ? centerX : 0.5, 0, 1);
        if (normalizedX <= DEMO_CONFIG.handGesture.zoneLeftMax) {
          return 0;
        }
        if (normalizedX >= DEMO_CONFIG.handGesture.zoneRightMin) {
          return DEMO_CONFIG.coffeeOptions.length - 1;
        }
        return 1;
      }

      function getConfirmedCoffeeIndex() {
        return DEMO_CONFIG.coffeeOptions.findIndex((coffee) => coffee.id === state.confirmedCoffeeId);
      }

      function buildCoffeeCards() {
        if (ui.coffeeCards && ui.coffeeCards.length) {
          return;
        }

        const fragment = document.createDocumentFragment();
        DEMO_CONFIG.coffeeOptions.forEach((coffee, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "coffee-card";
          button.dataset.coffeeId = coffee.id;
          button.setAttribute("aria-label", coffee.label);
          button.disabled = true;
          button.tabIndex = -1;
          button.innerHTML =
            '<span class="coffee-card-index">' +
            String(index + 1).padStart(2, "0") +
            '</span><div class="coffee-card-head"><div class="coffee-card-copy"><span class="coffee-card-title">' +
            coffee.label +
            '</span><div class="coffee-card-meta"><span class="coffee-card-subtitle">' +
            coffee.subtitle +
            '</span><span class="coffee-card-price">' +
            coffee.price +
            "</span></div></div>" +
            getCoffeeVisualMarkup(coffee.id) +
            '</div><span class="coffee-card-note">' +
            coffee.note +
            "</span>";
          fragment.appendChild(button);
        });

        ui.coffeeTray.innerHTML = "";
        ui.coffeeTray.appendChild(fragment);
        ui.coffeeCards = Array.from(ui.coffeeTray.querySelectorAll(".coffee-card"));
      }

      function getCoffeeCardLayout(index) {
        const confirmedIndex = getConfirmedCoffeeIndex();
        const pivotIndex = confirmedIndex >= 0 ? confirmedIndex : state.selectedCoffeeIndex;
        const relativeIndex = index - pivotIndex;

        if (state.conversationState === "confirmed" && confirmedIndex >= 0) {
          if (index === confirmedIndex) {
            return { x: 0, y: -18, scale: 1.1, opacity: 1, blur: 0, zIndex: 4 };
          }
          if (relativeIndex < 0) {
            return { x: -430, y: 46, scale: 0.6, opacity: 0.14, blur: 4.1, zIndex: 1 };
          }
          return { x: 430, y: 46, scale: 0.6, opacity: 0.14, blur: 4.1, zIndex: 1 };
        }

        const layouts = {
          "-2": { x: -590, y: 70, scale: 0.38, opacity: 0.04, blur: 6.8, zIndex: 1 },
          "-1": { x: -398, y: 34, scale: 0.62, opacity: 0.38, blur: 3.1, zIndex: 2 },
          "0": { x: 0, y: 0, scale: 1.1, opacity: 1, blur: 0, zIndex: 3 },
          "1": { x: 398, y: 34, scale: 0.62, opacity: 0.38, blur: 3.1, zIndex: 2 },
          "2": { x: 590, y: 70, scale: 0.38, opacity: 0.04, blur: 6.8, zIndex: 1 },
        };

        return (
          layouts[String(relativeIndex)] ||
          (relativeIndex < 0
            ? { x: -648, y: 76, scale: 0.34, opacity: 0.03, blur: 7.2, zIndex: 1 }
            : { x: 648, y: 76, scale: 0.34, opacity: 0.03, blur: 7.2, zIndex: 1 })
        );
      }

      function renderCoffeeCards(immediate = false) {
        if (!ui.coffeeCards || !ui.coffeeCards.length) {
          return;
        }

        ui.coffeeCards.forEach((card, index) => {
          const coffee = getCoffeeByIndex(index);
          const layout = getCoffeeCardLayout(index);
          const isConfirmed = state.confirmedCoffeeId === coffee.id;
          const isSelected = state.selectedCoffeeIndex === index && !state.confirmedCoffeeId;
          card.classList.toggle("is-selected", isSelected);
          card.classList.toggle("is-confirmed", isConfirmed);
          card.style.zIndex = String(layout.zIndex);
          card.style.filter = "blur(" + layout.blur.toFixed(2) + "px)";
          card.disabled = true;
          card.setAttribute("aria-pressed", String(isSelected || isConfirmed));

          const animation = {
            x: layout.x,
            y: layout.y,
            scale: layout.scale,
            opacity: layout.opacity,
            duration:
              state.reduceMotion || immediate
                ? 0
                : state.conversationState === "options" && !state.confirmedCoffeeId
                  ? DEMO_CONFIG.conversation.autoCycleTransitionMs / 1000
                  : 0.34,
            ease: "power3.out",
            overwrite: true,
          };

          if (state.reduceMotion || immediate) {
            gsap.set(card, animation);
          } else {
            gsap.to(card, animation);
          }
        });
      }

      function pulseOrbRing() {
        gsap.killTweensOf(ui.orbRing);
        gsap.fromTo(
          ui.orbRing,
          { scale: 1, opacity: 0.78 },
          {
            scale: 1.06,
            opacity: 1,
            duration: state.reduceMotion ? 0.14 : 0.22,
            ease: "power2.out",
            yoyo: true,
            repeat: 1,
            clearProps: "scale,opacity",
          }
        );
      }

      function syncPaymentCopy(nextState, coffee = getConfirmedCoffee()) {
        ui.paymentChipText.textContent = "Pura X Pay";
        ui.paymentAmount.textContent = coffee.price || "";
        ui.paymentSuccessTitle.textContent = "支付成功";
        ui.paymentSuccessSubtitle.textContent = coffee.label + "已下单";

        if (nextState === "waiting") {
          ui.paymentStatus.textContent = "等待支付确认";
          ui.paymentDetail.textContent = coffee.label + "订单已锁定，准备发起支付。";
          return;
        }

        if (nextState === "auth") {
          ui.paymentStatus.textContent = "人脸认证中";
          ui.paymentDetail.textContent = "正在确认持有人脸 · " + coffee.label;
          return;
        }

        if (nextState === "paying") {
          ui.paymentStatus.textContent = "支付处理中";
          ui.paymentDetail.textContent = coffee.label + " " + coffee.price + " · 正在完成支付";
          return;
        }

        if (nextState === "success") {
          ui.paymentStatus.textContent = "支付成功";
          ui.paymentDetail.textContent = coffee.label + "已下单，正在为你准备。";
          return;
        }

        ui.paymentStatus.textContent = "等待支付确认";
        ui.paymentDetail.textContent = "";
      }

      function resetPaymentVisuals(immediate = false) {
        state.paymentLocked = false;
        setPaymentState("hidden");
        syncPaymentCopy("hidden", getCoffeeByIndex(DEMO_CONFIG.conversation.defaultCoffeeIndex));

        gsap.killTweensOf([
          ui.paymentCard,
          ui.paymentFill,
          ui.paymentGlint,
          ui.paymentSuccess,
          ui.paymentStatus,
          ui.paymentDetail,
        ]);

        const hiddenState = {
          xPercent: -50,
          yPercent: -50,
          autoAlpha: 0,
          y: 8,
          scale: 0.97,
          filter: "blur(18px)",
        };

        if (immediate || state.reduceMotion) {
          gsap.set(ui.paymentCard, hiddenState);
          gsap.set(ui.paymentSuccess, { autoAlpha: 0, y: 10 });
          gsap.set(ui.paymentFill, { scaleX: 0, transformOrigin: "left center" });
          gsap.set(ui.paymentGlint, { opacity: 0, xPercent: -140 });
          return;
        }

        gsap.to(ui.paymentCard, {
          xPercent: -50,
          yPercent: -50,
          autoAlpha: 0,
          y: 8,
          scale: 0.97,
          filter: "blur(18px)",
          duration: 0.2,
          ease: "power2.out",
          overwrite: true,
        });
        gsap.to(ui.paymentSuccess, {
          autoAlpha: 0,
          y: 10,
          duration: 0.18,
          ease: "power2.out",
          overwrite: true,
        });
        gsap.set(ui.paymentFill, { scaleX: 0, transformOrigin: "left center" });
        gsap.set(ui.paymentGlint, { opacity: 0, xPercent: -140 });
      }

      function startPaymentFlow() {
        clearPaymentTimeline();

        if (state.phase !== "agent" || !state.confirmedCoffeeId) {
          return;
        }

        const coffee = getConfirmedCoffee();
        resetPaymentVisuals(true);
        state.paymentLocked = true;
        setPaymentState("waiting");
        syncPaymentCopy("waiting", coffee);

        const waitDuration = state.reduceMotion ? 0.36 : DEMO_CONFIG.conversation.paymentWaitMs / 1000;
        const authDuration = state.reduceMotion ? 0.28 : DEMO_CONFIG.conversation.paymentAuthMs / 1000;
        const payingDuration = state.reduceMotion ? 0.38 : DEMO_CONFIG.conversation.paymentPayMs / 1000;
        const revealDuration = state.reduceMotion ? 0.2 : DEMO_CONFIG.conversation.paymentRevealMs / 1000;

        const timeline = gsap.timeline({
          paused: true,
          onComplete: () => {
            state.paymentTimeline = null;
          },
        });

        state.paymentTimeline = timeline;

        timeline
          .to({}, { duration: waitDuration })
          .add(() => {
            if (state.phase !== "agent" || !state.confirmedCoffeeId) {
              return;
            }
            setPaymentState("auth");
            syncPaymentCopy("auth", coffee);
          })
          .to(
            ui.coffeeTray,
            {
              autoAlpha: 0.56,
              y: 18,
              scale: 0.92,
              filter: "blur(6px)",
              duration: state.reduceMotion ? 0.18 : 0.34,
              ease: "power3.out",
              overwrite: true,
            },
            "<"
          )
          .fromTo(
            ui.paymentCard,
            { xPercent: -50, yPercent: -50, autoAlpha: 0, y: 8, scale: 0.97, filter: "blur(18px)" },
            {
              xPercent: -50,
              yPercent: -50,
              autoAlpha: 1,
              y: 0,
              scale: 1,
              filter: "blur(0px)",
              duration: state.reduceMotion ? 0.22 : 0.42,
              ease: "expo.out",
              overwrite: true,
            },
            "<"
          )
          .to(
            ui.paymentFill,
            {
              scaleX: 0.34,
              duration: authDuration,
              ease: "power2.out",
              transformOrigin: "left center",
            },
            "<0.06"
          )
          .to(
            ui.paymentGlint,
            {
              opacity: 0.82,
              xPercent: 34,
              duration: authDuration,
              ease: "power2.out",
            },
            "<"
          )
          .add(() => {
            setPaymentState("paying");
            syncPaymentCopy("paying", coffee);
          })
          .to(ui.paymentFill, {
            scaleX: 0.82,
            duration: payingDuration,
            ease: "expo.inOut",
            transformOrigin: "left center",
          })
          .to(
            ui.paymentGlint,
            {
              xPercent: 136,
              duration: payingDuration,
              ease: "power1.inOut",
            },
            "<"
          )
          .add(() => {
            setPaymentState("success");
            syncPaymentCopy("success", coffee);
          })
          .to(
            ui.paymentFill,
            {
              scaleX: 1,
              duration: revealDuration,
              ease: "expo.out",
              transformOrigin: "left center",
            },
            ">"
          )
          .to(
            ui.paymentGlint,
            {
              opacity: 0.9,
              xPercent: 190,
              duration: revealDuration,
              ease: "power2.out",
            },
            "<"
          )
          .fromTo(
            ui.paymentSuccess,
            { autoAlpha: 0, y: 10 },
            {
              autoAlpha: 1,
              y: 0,
              duration: state.reduceMotion ? 0.18 : 0.3,
              ease: "power3.out",
            },
            "<0.05"
          )
          .to(ui.paymentGlint, {
            opacity: 0,
            duration: state.reduceMotion ? 0.12 : 0.24,
            ease: "power1.out",
          })
          .add(() => {
            state.paymentLocked = false;
          });

        timeline.play(0);
      }

      function dismissConversation(immediate = false) {
        clearConversationTimers();
        clearConversationTimeline();
        clearPaymentTimeline();
        setConversationState("hidden");
        setPaymentState("hidden");
        resetHandState(state.handState.supported);
        state.paymentLocked = false;

        gsap.killTweensOf([
          ui.conversationBubble,
          ui.coffeeTray,
          ui.conversationText,
          ui.paymentCard,
          ui.paymentFill,
          ui.paymentGlint,
          ui.paymentSuccess,
          motion,
          ui.orbRing,
        ]);
        if (ui.coffeeCards && ui.coffeeCards.length) {
          gsap.killTweensOf(ui.coffeeCards);
        }

        if (immediate || state.reduceMotion) {
          state.selectedCoffeeIndex = DEMO_CONFIG.conversation.defaultCoffeeIndex;
          state.confirmedCoffeeId = "";
          renderCoffeeCards(true);
          gsap.set(ui.conversationBubble, { autoAlpha: 0, y: 22, filter: "blur(18px)" });
          gsap.set(ui.coffeeTray, { autoAlpha: 0, y: 28, scale: 1, filter: "blur(18px)" });
          resetPaymentVisuals(true);
          motion.orbLift = 0;
          return;
        }

        gsap.to(ui.conversationBubble, {
          autoAlpha: 0,
          y: 22,
          filter: "blur(18px)",
          duration: 0.18,
          ease: "power2.out",
          overwrite: true,
        });
        gsap.to(ui.coffeeTray, {
          autoAlpha: 0,
          y: 28,
          scale: 1,
          filter: "blur(18px)",
          duration: 0.18,
          ease: "power2.out",
          overwrite: true,
        });
        resetPaymentVisuals(false);
        gsap.to(motion, {
          orbLift: 0,
          duration: 0.26,
          ease: "power3.out",
          overwrite: true,
        });
      }

      function setAutoCoffeeSelection(index, immediate = false) {
        const nextIndex = clamp(index, 0, DEMO_CONFIG.coffeeOptions.length - 1);
        if (nextIndex === state.selectedCoffeeIndex && !immediate) {
          return;
        }

        state.selectedCoffeeIndex = nextIndex;
        renderCoffeeCards(immediate);
      }

      function startAutoCoffeeSequence() {
        clearConversationTimeline();
        if (state.phase !== "agent" || state.conversationState !== "options" || state.confirmedCoffeeId) {
          return;
        }

        const sequence = DEMO_CONFIG.conversation.autoSequence
          .map((coffeeId) => getCoffeeIndexById(coffeeId))
          .filter((index) => index >= 0);
        if (!sequence.length) {
          return;
        }

        const cycleDelay = state.reduceMotion ? 0.52 : DEMO_CONFIG.conversation.autoCycleDelayMs / 1000;
        const confirmDelay = state.reduceMotion ? 0.26 : DEMO_CONFIG.conversation.autoConfirmDelayMs / 1000;
        const timeline = gsap.timeline({
          paused: true,
          onComplete: () => {
            state.conversationTimeline = null;
          },
        });

        state.conversationTimeline = timeline;

        sequence.forEach((index, sequenceIndex) => {
          timeline.to(
            {},
            {
              duration: sequenceIndex === 0 ? cycleDelay * 0.5 : cycleDelay,
              onComplete: () => {
                if (state.phase !== "agent" || state.conversationState !== "options" || state.confirmedCoffeeId) {
                  return;
                }
                setAutoCoffeeSelection(index, false);
              },
            }
          );
        });

        const finalIndex = sequence[sequence.length - 1];
        timeline.to(
          {},
          {
            duration: confirmDelay,
            onComplete: () => {
              confirmSelectedCoffee(finalIndex);
            },
          }
        );
        timeline.play(0);
      }

      function showConversationPrompt() {
        if (state.phase !== "agent") {
          return;
        }

        setConversationText("需要帮你再点一杯咖啡吗？");
        setConversationState("prompt");
        gsap.killTweensOf([ui.conversationBubble, motion]);
        if (state.reduceMotion) {
          gsap.set(ui.conversationBubble, { autoAlpha: 1, y: 0, filter: "blur(0px)" });
          motion.orbLift = -64;
          return;
        }

        gsap.fromTo(
          ui.conversationBubble,
          { autoAlpha: 0, y: 22, filter: "blur(18px)" },
          {
            autoAlpha: 1,
            y: 0,
            filter: "blur(0px)",
            duration: 0.4,
            ease: "power3.out",
            overwrite: true,
          }
        );
        gsap.to(motion, {
          orbLift: -64,
          duration: 0.34,
          ease: "power3.out",
          overwrite: true,
        });
      }

      function showCoffeeOptions() {
        if (state.phase !== "agent") {
          return;
        }

        state.selectedCoffeeIndex = DEMO_CONFIG.conversation.defaultCoffeeIndex;
        state.confirmedCoffeeId = "";
        state.handZoneIndex = -1;
        state.handZoneSince = 0;
        setConversationState("options");
        renderCoffeeCards(true);
        gsap.killTweensOf([ui.conversationBubble, ui.coffeeTray, motion]);
        clearPaymentTimeline();
        setPaymentState("hidden");
        state.paymentLocked = false;
        gsap.set(ui.paymentCard, { xPercent: -50, yPercent: -50, autoAlpha: 0, y: 8, scale: 0.97, filter: "blur(18px)" });
        gsap.set(ui.paymentSuccess, { autoAlpha: 0, y: 10 });
        gsap.set(ui.paymentFill, { scaleX: 0, transformOrigin: "left center" });
        gsap.set(ui.paymentGlint, { opacity: 0, xPercent: -140 });

        if (state.reduceMotion) {
          gsap.set(ui.conversationBubble, { autoAlpha: 0, y: -10, filter: "blur(12px)" });
          gsap.set(ui.coffeeTray, { autoAlpha: 1, y: 0, scale: 1, filter: "blur(0px)" });
          motion.orbLift = -94;
          startAutoCoffeeSequence();
          return;
        }

        gsap.to(ui.conversationBubble, {
          autoAlpha: 0,
          y: -10,
          filter: "blur(12px)",
          duration: 0.24,
          ease: "power2.out",
          overwrite: true,
        });

        gsap.fromTo(
          ui.coffeeTray,
          { autoAlpha: 0, y: 28, scale: 1, filter: "blur(18px)" },
          {
            autoAlpha: 1,
            y: 0,
            scale: 1,
            filter: "blur(0px)",
            duration: 0.42,
            ease: "power3.out",
            overwrite: true,
            onComplete: () => {
              startAutoCoffeeSequence();
            },
          }
        );
        gsap.to(motion, {
          orbLift: -94,
          duration: 0.34,
          ease: "power3.out",
          overwrite: true,
        });
      }

      function startConversationFlow() {
        dismissConversation(true);
        if (state.phase !== "agent") {
          return;
        }

        state.promptTimer = window.setTimeout(() => {
          showConversationPrompt();
          state.cardsTimer = window.setTimeout(() => {
            showCoffeeOptions();
          }, DEMO_CONFIG.conversation.cardsDelayMs);
        }, DEMO_CONFIG.conversation.promptDelayMs);
      }

      function shiftCoffeeSelection(direction) {
        if (state.phase !== "agent" || state.conversationState !== "options" || state.confirmedCoffeeId) {
          return;
        }

        const nextIndex = clamp(
          state.selectedCoffeeIndex + direction,
          0,
          DEMO_CONFIG.coffeeOptions.length - 1
        );
        if (nextIndex === state.selectedCoffeeIndex) {
          return;
        }

        state.selectedCoffeeIndex = nextIndex;
        renderCoffeeCards(false);
      }

      function confirmSelectedCoffee(forcedIndex = state.selectedCoffeeIndex) {
        if (state.phase !== "agent" || state.conversationState !== "options" || state.confirmedCoffeeId) {
          return;
        }

        const confirmedIndex = clamp(forcedIndex, 0, DEMO_CONFIG.coffeeOptions.length - 1);
        state.selectedCoffeeIndex = confirmedIndex;
        const coffee = getCoffeeByIndex(confirmedIndex);
        state.confirmedCoffeeId = coffee.id;
        state.handZoneIndex = -1;
        state.handZoneSince = 0;
        setConversationState("confirmed");
        resetHandState(state.handState.supported);
        setConversationText("");
        renderCoffeeCards(false);
        pulseOrbRing();

        gsap.killTweensOf([motion, ui.conversationBubble, ui.conversationText]);
        if (state.reduceMotion) {
          gsap.set(ui.conversationBubble, { autoAlpha: 0, y: -12, filter: "blur(14px)" });
        }
        if (!state.reduceMotion) {
          gsap.to(motion, {
            orbLift: -102,
            duration: 0.28,
            ease: "power3.out",
            overwrite: true,
          });
          gsap.to(ui.conversationBubble, {
            autoAlpha: 0,
            y: -12,
            filter: "blur(14px)",
            duration: 0.18,
            ease: "power2.out",
            overwrite: true,
          });
        }

        startPaymentFlow();
      }

      function handleCoffeeCardClick(index) {
        if (state.phase !== "agent" || state.conversationState !== "options" || state.confirmedCoffeeId) {
          return;
        }

        if (state.selectedCoffeeIndex === index) {
          confirmSelectedCoffee();
          return;
        }

        state.selectedCoffeeIndex = index;
        renderCoffeeCards(false);
      }

      function processHandSample(handSample) {
        const next = handSample || blankHandState(false);
        if (next.present) {
          state.handState.supported = Boolean(next.supported);
          state.handState.present = true;
          state.handState.centerX = lerp(state.handState.centerX, next.centerX || 0, 0.38);
          state.handState.velocityX = lerp(state.handState.velocityX, next.velocityX || 0, 0.34);
        } else {
          resetHandState(next.supported);
        }

        state.handState.swipeDirection = next.swipeDirection || 0;
        state.handState.pinchActive = Boolean(next.pinchActive);
        state.handState.pinchConfirmed = Boolean(next.pinchConfirmed);

        if (state.phase !== "agent" || state.conversationState !== "options" || state.confirmedCoffeeId) {
          state.handZoneIndex = -1;
          state.handZoneSince = 0;
          return;
        }

        if (!next.present) {
          state.handZoneIndex = -1;
          state.handZoneSince = 0;
          return;
        }

        const now = performance.now();
        const nextZoneIndex = resolveCoffeeIndexFromHandX(state.handState.centerX);

        if (nextZoneIndex !== state.selectedCoffeeIndex) {
          state.selectedCoffeeIndex = nextZoneIndex;
          renderCoffeeCards(false);
        }

        if (nextZoneIndex !== state.handZoneIndex) {
          state.handZoneIndex = nextZoneIndex;
          state.handZoneSince = now;
          return;
        }

        const slowEnough =
          Math.abs(state.handState.velocityX) <= DEMO_CONFIG.handGesture.hoverVelocityThreshold;
        const holdLongEnough =
          state.handZoneSince > 0 &&
          now - state.handZoneSince >= DEMO_CONFIG.handGesture.hoverConfirmHoldMs;

        if (slowEnough && holdLongEnough) {
          state.handZoneSince = 0;
          confirmSelectedCoffee();
        }
      }

      function isHandOnlyInteractionMode() {
        return false;
      }

      function sampleClockPoints(text) {
        const cacheKey = text + "|" + RUNTIME_TUNING.particleCount;
        const cached = state.pointCache.get(cacheKey);
        if (cached) {
          return cached;
        }

        sampleContext.clearRect(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize);
        sampleContext.fillStyle = "#fff";
        sampleContext.textAlign = "center";
        sampleContext.textBaseline = "middle";

        let fontSize = 284;
        while (fontSize > 200) {
          sampleContext.font = "200 " + fontSize + 'px "Sora", "Noto Sans SC", sans-serif';
          if (sampleContext.measureText(text).width < DEMO_CONFIG.stageSize * 0.77) {
            break;
          }
          fontSize -= 8;
        }

        sampleContext.fillText(text, DEMO_CONFIG.stageSize * 0.5, DEMO_CONFIG.stageSize * 0.5 + fontSize * 0.015);

        const imageData = sampleContext.getImageData(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize).data;
        const candidates = [];
        const step = RUNTIME_TUNING.lowPower ? 6 : 4;
        for (let y = 0; y < DEMO_CONFIG.stageSize; y += step) {
          for (let x = 0; x < DEMO_CONFIG.stageSize; x += step) {
            const alpha = imageData[(y * DEMO_CONFIG.stageSize + x) * 4 + 3];
            if (alpha > 24) {
              candidates.push({ x, y });
            }
          }
        }

        const points = [];
        if (!candidates.length) {
          for (let index = 0; index < RUNTIME_TUNING.particleCount; index += 1) {
            points.push({ x: DEMO_CONFIG.stageSize * 0.5, y: DEMO_CONFIG.stageSize * 0.5 });
          }
        } else {
          const stride = Math.max(1, Math.floor(candidates.length / RUNTIME_TUNING.particleCount));
          let cursor = 0;
          for (let index = 0; index < RUNTIME_TUNING.particleCount; index += 1) {
            const point = candidates[cursor % candidates.length];
            points.push({ x: point.x, y: point.y });
            cursor += stride;
          }
        }

        state.pointCache.set(cacheKey, points);
        return points;
      }

      function buildWakeParticles(text) {
        const centerX = DEMO_CONFIG.stageSize * 0.5;
        const centerY = DEMO_CONFIG.stageSize * 0.5;
        return sampleClockPoints(text).map((point) => {
          const angle = Math.atan2(point.y - centerY, point.x - centerX);
          const burstRadius = 22 + Math.random() * 52;
          return {
            startX: point.x,
            startY: point.y,
            midX: point.x + Math.cos(angle) * burstRadius + randomBetween(-18, 18),
            midY: point.y + Math.sin(angle) * burstRadius + randomBetween(-18, 18),
            endX: centerX + randomBetween(-42, 42),
            endY: centerY + randomBetween(-42, 42),
            size: RUNTIME_TUNING.lowPower ? randomBetween(1, 2.4) : randomBetween(1.2, 3.6),
            alpha: randomBetween(0.52, 0.96),
            tint: Math.random(),
            seed: Math.random() * Math.PI * 2,
          };
        });
      }

      function buildSleepParticles(text) {
        const centerX = DEMO_CONFIG.stageSize * 0.5;
        const centerY = DEMO_CONFIG.stageSize * 0.5;
        return sampleClockPoints(text).map((point) => {
          const angle = randomBetween(0, Math.PI * 2);
          const innerRadius = DEMO_CONFIG.orb.radius * randomBetween(0.12, 0.48);
          const outerRadius = DEMO_CONFIG.orb.radius * randomBetween(0.54, 1.06);
          return {
            startX: centerX + Math.cos(angle) * innerRadius + randomBetween(-18, 18),
            startY: centerY + Math.sin(angle) * innerRadius + randomBetween(-18, 18),
            midX: centerX + Math.cos(angle) * outerRadius,
            midY: centerY + Math.sin(angle) * outerRadius,
            endX: point.x,
            endY: point.y,
            size: RUNTIME_TUNING.lowPower ? randomBetween(1, 2.2) : randomBetween(1.2, 3.4),
            alpha: randomBetween(0.56, 0.98),
            tint: Math.random(),
            seed: Math.random() * Math.PI * 2,
          };
        });
      }

      function startParticleTransition(kind, text) {
        if (state.reduceMotion) {
          state.particleTransition = null;
          return;
        }

        state.particleTransition = {
          kind,
          startAt: performance.now(),
          duration:
            kind === "wake" ? DEMO_CONFIG.timings.wakingMs : DEMO_CONFIG.timings.sleepingMs,
          particles: kind === "wake" ? buildWakeParticles(text) : buildSleepParticles(text),
        };
      }

      function completeWakeTransition() {
        state.particleTransition = null;
        setPhase("agent");
        startConversationFlow();
      }

      function completeSleepTransition() {
        state.particleTransition = null;
        dismissConversation(true);
        setPhase("aod");
      }

      function triggerWake() {
        if (state.phase !== "aod") {
          return;
        }

        clearTransitionTimer();
        setPhase("waking");
        state.wakeCandidateSince = 0;
        state.sleepCandidateSince = 0;
        startParticleTransition("wake", state.clockValue);

        gsap.killTweensOf(motion);
        gsap.to(motion, {
          clockAlpha: 0,
          clockScale: state.reduceMotion ? 1.01 : 1.04,
          clockShiftY: -18,
          clockBlur: state.reduceMotion ? 2 : 22,
          haloStrength: 0.08,
          haloScale: state.reduceMotion ? 1.02 : 0.88,
          duration: state.reduceMotion ? 0.16 : 0.2,
          ease: "power2.out",
        });
        gsap.to(motion, {
          orbAlpha: 1,
          orbScale: 1,
          orbAura: state.reduceMotion ? 0.38 : 1,
          ringAlpha: state.reduceMotion ? 0.14 : 0.32,
          waveAlpha: 1,
          duration: state.reduceMotion ? 0.22 : 0.46,
          ease: "expo.out",
        });

        state.transitionTimer = window.setTimeout(() => {
          completeWakeTransition();
        }, state.reduceMotion ? 180 : DEMO_CONFIG.timings.wakingMs);
      }

      function triggerSleep() {
        if (state.phase !== "agent") {
          return;
        }

        clearTransitionTimer();
        dismissConversation(false);
        setPhase("sleeping");
        state.wakeCandidateSince = 0;
        state.sleepCandidateSince = 0;
        startParticleTransition("sleep", state.clockValue);

        gsap.killTweensOf(motion);
        gsap.to(motion, {
          orbAlpha: 0,
          orbScale: state.reduceMotion ? 0.92 : 0.82,
          orbAura: 0.18,
          ringAlpha: 0.08,
          waveAlpha: 0,
          orbLift: 0,
          duration: state.reduceMotion ? 0.18 : 0.34,
          ease: "power2.inOut",
        });
        gsap.to(motion, {
          clockAlpha: 1,
          clockScale: 1,
          clockShiftY: 0,
          clockBlur: 0,
          haloStrength: state.reduceMotion ? 0.16 : 0.26,
          haloScale: 1,
          delay: state.reduceMotion ? 0.02 : 0.12,
          duration: state.reduceMotion ? 0.2 : 0.28,
          ease: "power3.out",
        });

        state.transitionTimer = window.setTimeout(() => {
          completeSleepTransition();
        }, state.reduceMotion ? 220 : DEMO_CONFIG.timings.sleepingMs);
      }

      function updateStateMachine(now) {
        const pose = state.smoothedPose;

        if (state.phase === "waking" || state.phase === "sleeping") {
          return;
        }

        if (state.paymentLocked) {
          state.sleepCandidateSince = 0;
          state.wakeCandidateSince = 0;
          return;
        }

        if (isHandOnlyInteractionMode()) {
          state.sleepCandidateSince = 0;
          state.wakeCandidateSince = 0;
          return;
        }

        const wakeEligible = pose.gazeValid
          ? pose.gazeCentered > 0.42 && pose.gazeOpenness > 0.12
          : pose.headCentered > 0.965 && pose.confidence > 0.7;
        const attentive =
          pose.facePresent &&
          wakeEligible &&
          pose.attentiveness > DEMO_CONFIG.thresholds.attentionEnter &&
          Math.abs(pose.combinedYaw) < DEMO_CONFIG.thresholds.attentiveDeg &&
          Math.abs(pose.combinedPitch) < DEMO_CONFIG.thresholds.attentiveDeg;
        const away =
          !pose.facePresent ||
          pose.attentiveness < DEMO_CONFIG.thresholds.attentionExit ||
          Math.abs(pose.combinedYaw) > DEMO_CONFIG.thresholds.awayDeg ||
          Math.abs(pose.combinedPitch) > DEMO_CONFIG.thresholds.awayDeg ||
          Math.abs(pose.yaw) > DEMO_CONFIG.thresholds.headAwayDeg ||
          Math.abs(pose.pitch) > DEMO_CONFIG.thresholds.headAwayDeg;
        const snapWake =
          pose.facePresent &&
          pose.gazeValid &&
          pose.gazeCentered > 0.72 &&
          pose.attentiveness > DEMO_CONFIG.thresholds.snapWakeAttention &&
          Math.abs(pose.combinedYaw) < DEMO_CONFIG.thresholds.snapWakeDeg &&
          Math.abs(pose.combinedPitch) < DEMO_CONFIG.thresholds.snapWakeDeg;
        const snapSleep =
          !pose.facePresent ||
          pose.attentiveness < DEMO_CONFIG.thresholds.snapSleepAttention ||
          Math.abs(pose.combinedYaw) > DEMO_CONFIG.thresholds.snapSleepDeg ||
          Math.abs(pose.combinedPitch) > DEMO_CONFIG.thresholds.snapSleepDeg;
        const effectiveWakeHold = snapWake
          ? DEMO_CONFIG.timings.snapWakeHoldMs
          : Math.max(120, DEMO_CONFIG.timings.wakeHoldMs - pose.attentiveness * 40);
        const effectiveSleepHold = snapSleep
          ? DEMO_CONFIG.timings.snapSleepHoldMs
          : Math.max(260, DEMO_CONFIG.timings.sleepHoldMs - (1 - pose.attentiveness) * 80);

        if (state.phase === "aod") {
          if (attentive) {
            if (!state.wakeCandidateSince) {
              state.wakeCandidateSince = now;
            }
            if (now - state.wakeCandidateSince >= effectiveWakeHold) {
              triggerWake();
            }
          } else {
            state.wakeCandidateSince = 0;
          }
          return;
        }

        if (state.phase === "agent") {
          if (away) {
            if (!state.sleepCandidateSince) {
              state.sleepCandidateSince = now;
            }
            if (now - state.sleepCandidateSince >= effectiveSleepHold) {
              triggerSleep();
            }
          } else {
            state.sleepCandidateSince = 0;
          }
        }
      }

      function processPoseSample(sample) {
        const timestamp = sample.timestamp || performance.now();
        const hand =
          state.handPipelineMode === "main"
            ? null
            : sample.hand || blankHandState(Boolean(sample.handAvailable));
        if (!isHandOnlyInteractionMode()) {
          state.pose = {
            facePresent: Boolean(sample.facePresent),
            yaw: sample.yaw || 0,
            pitch: sample.pitch || 0,
            headCentered: sample.headCentered || 0,
            gazeYaw: sample.gazeYaw || 0,
            gazePitch: sample.gazePitch || 0,
            gazeCentered: sample.gazeCentered || 0,
            gazeOpenness: sample.gazeOpenness || 0,
            gazeValid: Boolean(sample.gazeValid),
            combinedYaw: sample.combinedYaw || 0,
            combinedPitch: sample.combinedPitch || 0,
            attentiveness: sample.attentiveness || 0,
            confidence: sample.confidence || 0,
            timestamp,
          };

          if (state.pose.facePresent) {
            if (!state.smoothedPose.facePresent) {
              state.smoothedPose.facePresent = true;
              state.smoothedPose.yaw = state.pose.yaw;
              state.smoothedPose.pitch = state.pose.pitch;
              state.smoothedPose.headCentered = state.pose.headCentered;
              state.smoothedPose.gazeYaw = state.pose.gazeYaw;
              state.smoothedPose.gazePitch = state.pose.gazePitch;
              state.smoothedPose.gazeCentered = state.pose.gazeCentered;
              state.smoothedPose.gazeOpenness = state.pose.gazeOpenness;
              state.smoothedPose.gazeValid = state.pose.gazeValid;
              state.smoothedPose.combinedYaw = state.pose.combinedYaw;
              state.smoothedPose.combinedPitch = state.pose.combinedPitch;
              state.smoothedPose.attentiveness = state.pose.attentiveness;
              state.smoothedPose.confidence = state.pose.confidence;
            } else {
              state.smoothedPose.yaw = lerp(
                state.smoothedPose.yaw,
                state.pose.yaw,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.pitch = lerp(
                state.smoothedPose.pitch,
                state.pose.pitch,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.headCentered = lerp(
                state.smoothedPose.headCentered,
                state.pose.headCentered,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.gazeYaw = lerp(
                state.smoothedPose.gazeYaw,
                state.pose.gazeYaw,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.gazePitch = lerp(
                state.smoothedPose.gazePitch,
                state.pose.gazePitch,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.gazeCentered = lerp(
                state.smoothedPose.gazeCentered,
                state.pose.gazeCentered,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.gazeOpenness = lerp(
                state.smoothedPose.gazeOpenness,
                state.pose.gazeOpenness,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.gazeValid = state.pose.gazeValid;
              state.smoothedPose.combinedYaw = lerp(
                state.smoothedPose.combinedYaw,
                state.pose.combinedYaw,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.combinedPitch = lerp(
                state.smoothedPose.combinedPitch,
                state.pose.combinedPitch,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.attentiveness = lerp(
                state.smoothedPose.attentiveness,
                state.pose.attentiveness,
                DEMO_CONFIG.smoothing.poseAlpha
              );
              state.smoothedPose.confidence = lerp(
                state.smoothedPose.confidence,
                state.pose.confidence,
                DEMO_CONFIG.smoothing.poseAlpha
              );
            }
          } else {
            state.smoothedPose.facePresent = false;
            state.smoothedPose.headCentered = 0;
            state.smoothedPose.gazeValid = false;
            state.smoothedPose.gazeYaw = 0;
            state.smoothedPose.gazePitch = 0;
            state.smoothedPose.gazeCentered = 0;
            state.smoothedPose.gazeOpenness = 0;
            state.smoothedPose.combinedYaw = 0;
            state.smoothedPose.combinedPitch = 0;
            state.smoothedPose.attentiveness = 0;
            state.smoothedPose.confidence = 0;
          }

          state.smoothedPose.timestamp = timestamp;
        }
        if (hand) {
          processHandSample(hand);
        }
        updateStateMachine(performance.now());
      }

      function drawWaves(now) {
        if (motion.waveAlpha < 0.01) {
          return;
        }

        const centerX = DEMO_CONFIG.stageSize * 0.5;
        const centerY = DEMO_CONFIG.stageSize * 0.5;
        const yawInfluence = state.smoothedPose.facePresent ? state.smoothedPose.combinedYaw / 18 : 0;
        const pitchInfluence = state.smoothedPose.facePresent ? state.smoothedPose.combinedPitch / 16 : 0;
        const attentiveness = state.smoothedPose.facePresent ? state.smoothedPose.attentiveness : 0;

        fxContext.save();
        fxContext.globalCompositeOperation = "screen";
        fxContext.globalAlpha = clamp(motion.waveAlpha, 0, 1);

        for (let ringIndex = 0; ringIndex < RUNTIME_TUNING.waveCount; ringIndex += 1) {
          const baseRadius =
            DEMO_CONFIG.orb.radius +
            44 +
            ringIndex * 34 +
            oscillators.breathe * (state.reduceMotion ? 2 : 10);
          fxContext.beginPath();

          const steps = RUNTIME_TUNING.waveSteps;
          for (let step = 0; step <= steps; step += 1) {
            const progress = step / steps;
            const angle = progress * Math.PI * 2;
            const lowWave =
              Math.sin(angle * (2.2 + ringIndex * 0.55) + now * 0.0017 * (1 + ringIndex * 0.12)) *
              (state.reduceMotion ? 3 : 8) *
              (0.7 + attentiveness * 0.65);
            const highWave =
              Math.sin(angle * 8.5 - now * 0.001 + ringIndex * 1.8) *
              (state.reduceMotion ? 1.2 : 3.6) *
              (0.75 + attentiveness * 0.5);
            const poseWarp =
              (Math.cos(angle - yawInfluence * 1.3) * yawInfluence * 16 +
                Math.sin(angle + pitchInfluence * 1.1) * pitchInfluence * 12) *
              (0.6 + attentiveness * 1.25);
            const radius = baseRadius + lowWave + highWave + poseWarp;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius * (0.95 + ringIndex * 0.02);

            if (step === 0) {
              fxContext.moveTo(x, y);
            } else {
              fxContext.lineTo(x, y);
            }
          }

          fxContext.closePath();
          fxContext.strokeStyle =
            ringIndex % 2 === 0
              ? rgba(DEMO_CONFIG.colors.cyan, 0.18 + attentiveness * 0.16 - ringIndex * 0.04)
              : rgba(DEMO_CONFIG.colors.purple, 0.16 + attentiveness * 0.14 - ringIndex * 0.04);
          fxContext.lineWidth = 1.25 - ringIndex * 0.18;
          fxContext.stroke();
        }

        fxContext.restore();
      }

      function drawParticles(now) {
        if (!state.particleTransition) {
          return;
        }

        const transition = state.particleTransition;
        const progress = clamp((now - transition.startAt) / transition.duration, 0, 1);
        const useRects = RUNTIME_TUNING.lowPower;

        fxContext.save();
        fxContext.globalCompositeOperation = "screen";

        transition.particles.forEach((particle) => {
          let x = particle.startX;
          let y = particle.startY;
          let alpha = particle.alpha;

          if (transition.kind === "wake") {
            if (progress < 0.22) {
              const explode = easeOutQuart(progress / 0.22);
              x = lerp(particle.startX, particle.midX, explode);
              y = lerp(particle.startY, particle.midY, explode);
            } else {
              const implode = easeInExpo((progress - 0.18) / 0.82);
              x = lerp(particle.midX, particle.endX, clamp(implode, 0, 1));
              y = lerp(particle.midY, particle.endY, clamp(implode, 0, 1));
              alpha *= lerp(1, 0.72, clamp(implode, 0, 1));
            }
          } else {
            if (progress < 0.26) {
              const bloom = easeOutQuart(progress / 0.26);
              x = lerp(particle.startX, particle.midX, bloom);
              y = lerp(particle.startY, particle.midY, bloom);
            } else {
              const settle = easeInOutCubic((progress - 0.16) / 0.84);
              x = lerp(particle.midX, particle.endX, clamp(settle, 0, 1));
              y = lerp(particle.midY, particle.endY, clamp(settle, 0, 1));
            }
            alpha *= lerp(1, 0.8, progress);
          }

          const flicker = useRects ? 0.92 : 0.84 + Math.sin(now * 0.01 + particle.seed) * 0.16;
          const color =
            particle.tint < 0.55
              ? rgba(DEMO_CONFIG.colors.cyan, clamp(alpha * flicker, 0, 1))
              : rgba(DEMO_CONFIG.colors.purple, clamp(alpha * flicker, 0, 1));

          fxContext.fillStyle = color;
          if (useRects) {
            const size = particle.size * 1.2;
            fxContext.fillRect(x - size * 0.5, y - size * 0.5, size, size);
          } else {
            fxContext.beginPath();
            fxContext.arc(x, y, particle.size, 0, Math.PI * 2);
            fxContext.fill();
          }
        });

        fxContext.restore();

        if (progress >= 1) {
          state.particleTransition = null;
        }
      }

      function applyPresentation(now) {
        const breathe = state.reduceMotion ? oscillators.breathe * 0.18 : oscillators.breathe;
        const morph = state.reduceMotion ? oscillators.morph * 0.1 : oscillators.morph;
        const shimmer = state.reduceMotion ? oscillators.shimmer * 0.18 : oscillators.shimmer;
        const motionGain = RUNTIME_TUNING.motionGain;
        const yaw = state.smoothedPose.facePresent ? state.smoothedPose.yaw : 0;
        const pitch = state.smoothedPose.facePresent ? state.smoothedPose.pitch : 0;
        const focusYaw = state.smoothedPose.facePresent ? state.smoothedPose.combinedYaw : 0;
        const focusPitch = state.smoothedPose.facePresent ? state.smoothedPose.combinedPitch : 0;
        const attentiveness = state.smoothedPose.facePresent ? state.smoothedPose.attentiveness : 0;
        const tiltX = clamp(-focusPitch * 0.7, -18, 18);
        const tiltY = clamp(focusYaw * 0.84, -20, 20);

        document.documentElement.style.setProperty("--clock-alpha", motion.clockAlpha.toFixed(3));
        document.documentElement.style.setProperty("--clock-scale", (motion.clockScale + breathe * 0.015).toFixed(3));
        document.documentElement.style.setProperty(
          "--clock-shift-x",
          (
            (state.phase === "aod" ? clamp(focusYaw * 1.15, -18, 18) : clamp(focusYaw * 0.24, -6, 6)) *
            (0.2 + attentiveness * 0.9) *
            motionGain
          ).toFixed(2) + "px"
        );
        document.documentElement.style.setProperty(
          "--clock-shift-y",
          (
            motion.clockShiftY +
            Math.sin(now * 0.0018) * (state.phase === "aod" ? 4 : 1.2) +
            clamp(focusPitch * 0.58, -10, 10) * (0.15 + attentiveness * 0.7) * motionGain
          ).toFixed(2) + "px"
        );
        document.documentElement.style.setProperty("--clock-blur", motion.clockBlur.toFixed(2) + "px");
        document.documentElement.style.setProperty(
          "--aod-halo-strength",
          (motion.haloStrength + breathe * (state.reduceMotion ? 0.01 : 0.05) + attentiveness * 0.09).toFixed(3)
        );
        document.documentElement.style.setProperty(
          "--aod-halo-scale",
          (motion.haloScale + breathe * (state.reduceMotion ? 0.01 : 0.04)).toFixed(3)
        );
        document.documentElement.style.setProperty("--orb-alpha", motion.orbAlpha.toFixed(3));
        document.documentElement.style.setProperty(
          "--orb-scale",
          (motion.orbScale + breathe * (state.reduceMotion ? 0.012 : 0.05)).toFixed(3)
        );
        document.documentElement.style.setProperty("--orb-lift", motion.orbLift.toFixed(2) + "px");
        document.documentElement.style.setProperty(
          "--orb-tilt-x",
          (tiltX + Math.sin(now * 0.0015) * motion.orbAlpha * 1.4).toFixed(2) + "deg"
        );
        document.documentElement.style.setProperty(
          "--orb-tilt-y",
          (tiltY + Math.cos(now * 0.0011) * motion.orbAlpha * 1.8).toFixed(2) + "deg"
        );
        document.documentElement.style.setProperty(
          "--orb-aura",
          (motion.orbAura + attentiveness * (state.reduceMotion ? 0.06 : 0.18)).toFixed(3)
        );
        document.documentElement.style.setProperty(
          "--orb-highlight-shift-x",
          (
            Math.sin(now * 0.0013 + shimmer) * (state.reduceMotion ? 3 : 16) * motionGain +
            clamp(focusYaw * 0.9, -12, 12) * motionGain
          ).toFixed(2) + "px"
        );
        document.documentElement.style.setProperty(
          "--orb-highlight-shift-y",
          (
            Math.cos(now * 0.0011 + shimmer) * (state.reduceMotion ? 2 : 11) * motionGain +
            clamp(focusPitch * 0.65, -10, 10) * motionGain
          ).toFixed(2) + "px"
        );
        document.documentElement.style.setProperty("--orb-sheen-rotate", (shimmer * 14).toFixed(2) + "deg");
        document.documentElement.style.setProperty(
          "--ring-alpha",
          (motion.ringAlpha + attentiveness * (state.reduceMotion ? 0.03 : 0.12)).toFixed(3)
        );

        const morphA =
          44 + Math.sin(now * 0.0012) * 4 + morph * 5 + "% " +
          (56 - morph * 6) + "% " +
          (52 + Math.cos(now * 0.0011) * 5) + "% " +
          (48 - morph * 3) + "% / " +
          (44 + morph * 8) + "% " +
          (38 + Math.sin(now * 0.0009) * 6) + "% " +
          (62 - morph * 8) + "% " +
          (56 - Math.cos(now * 0.0013) * 5) + "%";
        const morphB =
          (58 - morph * 7) + "% " +
          (42 + Math.cos(now * 0.0014) * 4) + "% " +
          (46 + morph * 5) + "% " +
          (54 - Math.sin(now * 0.0015) * 4) + "% / " +
          (58 - Math.cos(now * 0.0012) * 6) + "% " +
          (63 - morph * 7) + "% " +
          (37 + morph * 7) + "% " +
          (42 + Math.sin(now * 0.0014) * 6) + "%";

        document.documentElement.style.setProperty("--orb-morph-a", morphA);
        document.documentElement.style.setProperty("--orb-morph-b", morphB);

        ui.orbLiquid.style.transform =
          "translate3d(" +
          (Math.sin(now * 0.001 + morph) * (state.reduceMotion ? 4 : 18)).toFixed(2) +
          "px, " +
          (Math.cos(now * 0.0012 + morph) * (state.reduceMotion ? 3 : 14)).toFixed(2) +
          "px, 38px) scale(" +
          (1.02 + morph * 0.08).toFixed(3) +
          ")";
      }

      function render(now) {
        applyPresentation(now);

        const needsFx = motion.waveAlpha > 0.01 || Boolean(state.particleTransition);
        if (!needsFx) {
          if (state.fxActive) {
            fxContext.clearRect(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize);
            state.fxActive = false;
          }
          state.renderRaf = window.requestAnimationFrame(render);
          return;
        }

        const effectInterval = 1000 / RUNTIME_TUNING.effectFps;
        if (now - state.lastFxFrameAt >= effectInterval) {
          fxContext.clearRect(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize);
          drawWaves(now);
          drawParticles(now);
          state.lastFxFrameAt = now;
          state.fxActive = true;
        }

        state.renderRaf = window.requestAnimationFrame(render);
      }

      function startRenderLoop() {
        if (state.renderRaf) {
          return;
        }
        state.renderRaf = window.requestAnimationFrame(render);
      }

      function stopRenderLoop() {
        if (!state.renderRaf) {
          return;
        }
        window.cancelAnimationFrame(state.renderRaf);
        state.renderRaf = 0;
        state.lastFxFrameAt = 0;
        if (state.fxActive) {
          fxContext.clearRect(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize);
          state.fxActive = false;
        }
      }

      function resetToAodVisualState() {
        gsap.killTweensOf(motion);
        motion.clockAlpha = 1;
        motion.clockScale = 1;
        motion.clockShiftY = 0;
        motion.clockBlur = 0;
        motion.haloStrength = state.reduceMotion ? 0.16 : 0.26;
        motion.haloScale = 1;
        motion.orbLift = 0;
        motion.orbAlpha = 0;
        motion.orbScale = 0.8;
        motion.orbAura = 0.14;
        motion.ringAlpha = 0.08;
        motion.waveAlpha = 0;
      }

      async function waitForVideoMetadata(video) {
        if (video.readyState >= 1) {
          return;
        }
        await new Promise((resolve) => {
          video.addEventListener("loadedmetadata", resolve, { once: true });
        });
      }

      async function startCamera() {
        if (state.stream) {
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("当前环境不支持摄像头访问，请改用 localhost 或 HTTPS。");
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: "user",
            width: { ideal: RUNTIME_TUNING.captureWidth },
            height: { ideal: RUNTIME_TUNING.captureHeight },
            frameRate: { ideal: 24, max: 30 },
          },
        });

        state.stream = stream;
        ui.cameraFeed.srcObject = stream;
        await waitForVideoMetadata(ui.cameraFeed);
        await ui.cameraFeed.play();
      }

      function stopCamera() {
        if (!state.stream) {
          return;
        }
        state.stream.getTracks().forEach((track) => track.stop());
        state.stream = null;
        ui.cameraFeed.srcObject = null;
      }

      function disposeWorker() {
        if (state.worker) {
          try {
            state.worker.postMessage({ type: "dispose" });
          } catch (_error) {
          }
          state.worker.terminate();
        }
        if (state.workerUrl) {
          URL.revokeObjectURL(state.workerUrl);
        }
        state.worker = null;
        state.workerUrl = "";
        state.workerReady = false;
      }

      function disposeFallbackLandmarker() {
        if (state.fallbackLandmarker && typeof state.fallbackLandmarker.close === "function") {
          try {
            state.fallbackLandmarker.close();
          } catch (_error) {
          }
        }
        state.fallbackLandmarker = null;
      }

      function destroyPosePipeline() {
        disposeWorker();
        disposeFallbackLandmarker();
        disposeMainHandLandmarker();
        state.pipelineMode = "";
        state.handPipelineMode = "";
        state.capturePending = false;
        state.fallbackBusy = false;
        state.mainHandBusy = false;
      }

      async function initFallbackLandmarker() {
        if (state.fallbackLandmarker) {
          state.pipelineMode = "main";
          return;
        }

        const vision = await FilesetResolver.forVisionTasks(DEMO_CONFIG.mediaPipe.wasmUrl);
        state.fallbackLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: DEMO_CONFIG.mediaPipe.modelUrl,
            delegate: "CPU",
          },
          runningMode: "VIDEO",
          numFaces: 1,
          minFaceDetectionConfidence: 0.5,
          minFacePresenceConfidence: 0.5,
          minTrackingConfidence: 0.5,
          outputFaceBlendshapes: false,
          outputFacialTransformationMatrixes: true,
        });
        state.pipelineMode = "main";
      }

      function extractPoseFromMatrix(data) {
        const forwardX = data[2];
        const forwardY = data[6];
        const forwardZ = data[10];
        return {
          yaw: (Math.atan2(forwardX, forwardZ) * 180) / Math.PI,
          pitch: (Math.atan2(-forwardY, Math.hypot(forwardX, forwardZ)) * 180) / Math.PI,
        };
      }

      function extractFallbackPose(result) {
        const landmarks = result?.faceLandmarks?.[0];
        const matrix = result?.facialTransformationMatrixes?.[0];
        if (!landmarks || !matrix?.data?.length) {
          return enrichAttention({
            facePresent: false,
            yaw: 0,
            pitch: 0,
            gazeYaw: 0,
            gazePitch: 0,
            gazeCentered: 0,
            gazeOpenness: 0,
            gazeValid: false,
            confidence: 0,
          });
        }

        const pose = extractPoseFromMatrix(matrix.data);
        const gaze = extractGazeFromLandmarks(landmarks);
        return enrichAttention({
          facePresent: true,
          yaw: pose.yaw,
          pitch: pose.pitch,
          gazeYaw: gaze.gazeYaw,
          gazePitch: gaze.gazePitch,
          gazeCentered: gaze.gazeCentered,
          gazeOpenness: gaze.gazeOpenness,
          gazeValid: gaze.gazeValid,
          confidence: gaze.gazeValid ? Math.max(0.8, gaze.gazeOpenness) : 0.72,
        });
      }

      async function initWorkerPipeline() {
        const workerSource = ui.workerSource.textContent.trim();
        if (!workerSource) {
          throw new Error("Pose worker source missing");
        }

        const blob = new Blob([workerSource], { type: "text/javascript" });
        const workerUrl = URL.createObjectURL(blob);
        const worker = new Worker(workerUrl, { type: "module" });

        return await new Promise((resolve, reject) => {
          let settled = false;

          const finalizeResolve = () => {
            if (settled) {
              return;
            }
            settled = true;
            state.worker = worker;
            state.workerUrl = workerUrl;
            state.workerReady = true;
            state.pipelineMode = "worker";
            resolve();
          };

          const finalizeReject = (error) => {
            if (settled) {
              return;
            }
            settled = true;
            worker.terminate();
            URL.revokeObjectURL(workerUrl);
            reject(error);
          };

          worker.addEventListener("message", async (event) => {
            const message = event.data || {};
            if (message.type === "pose") {
              if (message.ready && !state.workerReady) {
                state.handState.supported = Boolean(message.handAvailable);
                state.handPipelineMode = message.handAvailable ? "worker" : "";
                finalizeResolve();
                return;
              }
              state.capturePending = false;
              processPoseSample(message);
              return;
            }

            if (message.type === "error") {
              state.capturePending = false;
              if (!settled) {
                finalizeReject(new Error(message.message || "Pose worker init failed"));
                return;
              }
              try {
                await switchToFallback(message.message || "Pose worker runtime failed");
              } catch (error) {
                console.error(error);
                suspendExperience("AI 感知模型运行失败，请稍后重试。");
                setOverlay(
                  "error",
                  error instanceof Error ? error.message : "AI 感知模型运行失败，请稍后重试。"
                );
              }
            }
          });

          worker.addEventListener("error", (event) => {
            finalizeReject(new Error(event.message || "Pose worker crashed"));
          });

          worker.postMessage({
            type: "init",
            config: {
              wasmUrl: DEMO_CONFIG.mediaPipe.wasmUrl,
              modelUrl: DEMO_CONFIG.mediaPipe.modelUrl,
              handModelUrl: DEMO_CONFIG.mediaPipe.handModelUrl,
              lowPower: RUNTIME_TUNING.lowPower,
              handGesture: DEMO_CONFIG.handGesture,
            },
          });
        });
      }

      async function ensurePosePipeline() {
        if (state.pipelineMode === "worker" && state.workerReady) {
          return;
        }
        if (state.pipelineMode === "main" && state.fallbackLandmarker) {
          return;
        }

        try {
          await initWorkerPipeline();
        } catch (workerError) {
          console.warn("Pose worker unavailable, falling back to main thread.", workerError);
          await initFallbackLandmarker();
        }
      }

      async function switchToFallback(reason) {
        console.warn("Switching pose detection to main thread.", reason);
        disposeWorker();
        state.handPipelineMode = "";
        await initFallbackLandmarker();
      }

      async function captureWorkerFrame() {
        if (!state.worker || !state.workerReady || state.capturePending) {
          return;
        }
        if (ui.cameraFeed.readyState < 2) {
          return;
        }

        state.capturePending = true;
        try {
          const frame = await createImageBitmap(ui.cameraFeed);
          const handOnlyMode = isHandOnlyInteractionMode();
          state.worker.postMessage(
            {
              type: "frame",
              imageBitmap: frame,
              gestureEnabled: handOnlyMode && state.handPipelineMode === "worker",
              faceEnabled: !handOnlyMode,
              timestamp: performance.now(),
            },
            [frame]
          );
        } catch (error) {
          state.capturePending = false;
          await switchToFallback(error instanceof Error ? error.message : "Frame capture failed");
        }
      }

      async function captureFallbackPose() {
        if (!state.fallbackLandmarker || state.fallbackBusy) {
          return;
        }
        if (ui.cameraFeed.readyState < 2) {
          return;
        }

        state.fallbackBusy = true;
        try {
          const result = state.fallbackLandmarker.detectForVideo(ui.cameraFeed, performance.now());
          const sample = extractFallbackPose(result);
          processPoseSample({
            type: "pose",
            ready: true,
            facePresent: sample.facePresent,
            yaw: sample.yaw,
            pitch: sample.pitch,
            gazeYaw: sample.gazeYaw,
            gazePitch: sample.gazePitch,
            gazeCentered: sample.gazeCentered,
            gazeOpenness: sample.gazeOpenness,
            gazeValid: sample.gazeValid,
            combinedYaw: sample.combinedYaw,
            combinedPitch: sample.combinedPitch,
            attentiveness: sample.attentiveness,
            confidence: sample.confidence,
            hand: blankHandState(false),
            handAvailable: false,
            timestamp: performance.now(),
          });
        } finally {
          state.fallbackBusy = false;
        }
      }

      async function captureMainHandGesture() {
        if (!state.mainHandLandmarker || state.mainHandBusy) {
          return;
        }
        if (state.phase !== "agent" || state.conversationState !== "options" || state.confirmedCoffeeId) {
          return;
        }
        if (ui.cameraFeed.readyState < 2) {
          return;
        }

        state.mainHandBusy = true;
        try {
          const timestamp = performance.now();
          const result = state.mainHandLandmarker.detectForVideo(ui.cameraFeed, timestamp);
          processHandSample(extractMainHandGesture(result?.landmarks?.[0], timestamp));
        } catch (error) {
          console.warn("Main-thread hand detection failed.", error);
          disposeMainHandLandmarker();
          state.handState.supported = false;
          resetHandState(false);
        } finally {
          state.mainHandBusy = false;
        }
      }

      function startDetectionLoop() {
        if (state.detectionTimer) {
          return;
        }

        const interval = Math.round(1000 / RUNTIME_TUNING.detectionFps);
        state.detectionTimer = window.setInterval(() => {
          if (!state.stream) {
            return;
          }
          const handOnlyMode = isHandOnlyInteractionMode();
          if (state.pipelineMode === "worker") {
            if (!(handOnlyMode && state.handPipelineMode === "main")) {
              void captureWorkerFrame();
            }
          } else if (state.pipelineMode === "main" && !handOnlyMode) {
            void captureFallbackPose();
          }

          if (
            handOnlyMode &&
            state.handPipelineMode !== "worker"
          ) {
            if (state.mainHandLandmarker) {
              void captureMainHandGesture();
            } else {
              void ensureHandGesturePipeline();
            }
          }
        }, interval);
      }

      function stopDetectionLoop() {
        if (!state.detectionTimer) {
          return;
        }
        window.clearInterval(state.detectionTimer);
        state.detectionTimer = 0;
      }

      async function requestExperience() {
        if (state.permissionBusy) {
          return;
        }

        state.permissionBusy = true;
        ui.permissionButton.disabled = true;

        try {
          await startCamera();
          await ensurePosePipeline();
          startDetectionLoop();
          hideOverlay();
          dismissConversation(true);
          resetToAodVisualState();
          state.resumeHint = false;
          setPhase("aod");
        } catch (error) {
          console.error(error);
          const message =
            error instanceof Error
              ? error.message
              : "摄像头或 AI 模型初始化失败，请确认当前环境支持 localhost 或 HTTPS。";
          setOverlay("error", message);
          setPhase("aod");
        } finally {
          state.permissionBusy = false;
          ui.permissionButton.disabled = false;
        }
      }

      function suspendExperience(detail) {
        clearTransitionTimer();
        stopDetectionLoop();
        destroyPosePipeline();
        stopCamera();
        state.capturePending = false;
        state.fallbackBusy = false;
        state.wakeCandidateSince = 0;
        state.sleepCandidateSince = 0;
        state.pose.facePresent = false;
        state.smoothedPose.facePresent = false;
        state.particleTransition = null;
        dismissConversation(true);
        resetToAodVisualState();
        setPhase("aod");
        if (detail) {
          setOverlay("resume", detail);
          state.resumeHint = true;
        }
      }

      function handleVisibilityChange() {
        if (document.hidden) {
          stopRenderLoop();
          suspendExperience("页面切到后台后已暂停外屏感知，返回前台时点击恢复。");
          return;
        }

        startRenderLoop();
        if (state.resumeHint) {
          setOverlay("resume", "页面已回到前台，点击后重新连接摄像头并恢复 AI 感知。");
        }
      }

      function initialiseMotion() {
        gsap.to(oscillators, {
          breathe: 1,
          duration: 3.4,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });
        gsap.to(oscillators, {
          morph: 1,
          duration: 5.8,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });
        gsap.to(oscillators, {
          shimmer: 1,
          duration: 4.2,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });
      }

      function init() {
        if (!window.gsap) {
          setOverlay("error", "GSAP CDN 加载失败，请刷新页面后重试。");
          return;
        }

        buildCoffeeCards();
        applyRuntimeProfile();
        configureFxCanvas();
        syncViewportMetrics();
        updateClock(true);
        dismissConversation(true);
        resetToAodVisualState();
        initialiseMotion();
        startRenderLoop();

        ui.permissionButton.addEventListener("click", () => {
          void requestExperience();
        });

        window.setInterval(() => {
          updateClock();
        }, 1000);

        window.addEventListener("resize", syncViewportMetrics, { passive: true });
        window.addEventListener("orientationchange", syncViewportMetrics, { passive: true });
        document.addEventListener("visibilitychange", handleVisibilityChange);
        window.addEventListener("pagehide", () => {
          stopRenderLoop();
          suspendExperience("");
        });
        window.addEventListener("beforeunload", () => {
          stopRenderLoop();
          suspendExperience("");
        });
        const handleMotionPreferenceChange = (event) => {
          state.reduceMotion = event.matches;
          applyRuntimeProfile();
          configureFxCanvas();
          renderCoffeeCards(true);
          resetToAodVisualState();
        };

        if (typeof motionQuery.addEventListener === "function") {
          motionQuery.addEventListener("change", handleMotionPreferenceChange);
        } else if (typeof motionQuery.addListener === "function") {
          motionQuery.addListener(handleMotionPreferenceChange);
        }

        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", syncViewportMetrics, { passive: true });
          window.visualViewport.addEventListener("scroll", syncViewportMetrics, { passive: true });
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(() => {
            state.pointCache.clear();
          });
        }

        setOverlay("permission");
      }

      init();
    </script>
  </body>
</html>
