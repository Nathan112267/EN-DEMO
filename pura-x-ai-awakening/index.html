<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Pura X | AI 觉醒</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Sora:wght@200;300;400;500;600;700&display=swap");

      :root {
        color-scheme: dark;
        --stage-size: 980px;
        --stage-scale: 1;
        --stage-frame-size: 980px;
        --viewport-width: 100vw;
        --viewport-height: 100vh;
        --viewport-offset-x: 0px;
        --viewport-offset-y: 0px;
        --cyan-rgb: 103, 255, 245;
        --purple-rgb: 154, 94, 255;
        --ice-rgb: 209, 255, 255;
        --ink-rgb: 1, 4, 14;
        --device-glow-blur: 80px;
        --clock-halo-blur: 58px;
        --orb-aura-blur: 48px;
        --orb-surface-backdrop: blur(22px) saturate(150%);
        --orb-liquid-blur: 18px;
        --orb-highlight-blur: 6px;
        --overlay-backdrop: blur(22px) saturate(110%);
        --overlay-opacity: 1;
        --clock-alpha: 1;
        --clock-scale: 1;
        --clock-shift-x: 0px;
        --clock-shift-y: 0px;
        --clock-blur: 0px;
        --aod-halo-strength: 0.26;
        --aod-halo-scale: 1;
        --orb-alpha: 0;
        --orb-scale: 0.8;
        --orb-tilt-x: 0deg;
        --orb-tilt-y: 0deg;
        --orb-aura: 0.12;
        --orb-highlight-shift-x: 0px;
        --orb-highlight-shift-y: 0px;
        --orb-sheen-rotate: 0deg;
        --orb-lift: 0px;
        --orb-morph-a: 44% 56% 52% 48% / 44% 38% 62% 56%;
        --orb-morph-b: 58% 42% 46% 54% / 58% 63% 37% 42%;
        --ring-alpha: 0.08;
        --permission-pointer: auto;
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        color: rgb(var(--ice-rgb));
        overscroll-behavior: none;
      }

      body {
        position: fixed;
        inset: 0;
        font-family: "Sora", "Noto Sans SC", sans-serif;
        touch-action: manipulation;
      }

      .viewport-shell {
        position: fixed;
        left: var(--viewport-offset-x);
        top: var(--viewport-offset-y);
        width: var(--viewport-width);
        height: var(--viewport-height);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding:
          max(16px, env(safe-area-inset-top))
          max(16px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom))
          max(16px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at 50% 14%, rgba(var(--purple-rgb), 0.1), transparent 36%),
          radial-gradient(circle at 50% 86%, rgba(var(--cyan-rgb), 0.08), transparent 42%),
          #000;
      }

      .stage-frame {
        position: relative;
        flex: none;
        width: var(--stage-frame-size);
        height: var(--stage-frame-size);
      }

      .device-stage {
        position: relative;
        width: var(--stage-size);
        height: var(--stage-size);
        overflow: hidden;
        background:
          radial-gradient(circle at 48% 48%, rgba(7, 10, 28, 0.72), rgba(0, 0, 0, 0.96) 60%),
          #000;
        border-radius: 58px;
        position: absolute;
        left: 0;
        top: 0;
        transform: scale(var(--stage-scale));
        transform-origin: top left;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 34px 130px rgba(0, 0, 0, 0.6);
        isolation: isolate;
      }

      .device-stage::before,
      .device-stage::after {
        content: "";
        position: absolute;
        inset: -18%;
        pointer-events: none;
      }

      .device-stage::before {
        background:
          radial-gradient(circle at 21% 18%, rgba(var(--cyan-rgb), 0.18), transparent 28%),
          radial-gradient(circle at 79% 18%, rgba(var(--purple-rgb), 0.16), transparent 30%),
          radial-gradient(circle at 50% 86%, rgba(var(--cyan-rgb), 0.1), transparent 32%);
        opacity: 0.52;
        filter: blur(var(--device-glow-blur));
      }

      .device-stage::after {
        background:
          linear-gradient(140deg, rgba(var(--cyan-rgb), 0.09), transparent 24%),
          linear-gradient(315deg, rgba(var(--purple-rgb), 0.1), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0));
        mix-blend-mode: screen;
        opacity: 0.8;
      }

      .aod-layer,
      #fxCanvas,
      .agent-layer,
      .permission-overlay {
        position: absolute;
        inset: 0;
      }

      .aod-layer {
        display: grid;
        place-items: center;
      }

      .aod-layer::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(var(--cyan-rgb), 0.025), transparent 24%),
          linear-gradient(315deg, rgba(var(--purple-rgb), 0.028), transparent 28%);
        opacity: 0.9;
      }

      .clock-wrap {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 100%;
        opacity: var(--clock-alpha);
        transform: translate3d(var(--clock-shift-x), var(--clock-shift-y), 0) scale(var(--clock-scale));
        filter: blur(var(--clock-blur));
        will-change: transform, opacity, filter;
      }

      .clock-time {
        position: relative;
        font-size: clamp(230px, 25vw, 278px);
        font-weight: 200;
        line-height: 0.9;
        letter-spacing: -0.085em;
        color: rgba(236, 247, 255, 0.94);
        text-shadow:
          0 0 22px rgba(255, 255, 255, 0.09),
          0 0 42px rgba(var(--cyan-rgb), 0.05);
        user-select: none;
      }

      .clock-time::before,
      .clock-time::after {
        content: "";
        position: absolute;
        inset: -180px -140px;
        pointer-events: none;
      }

      .clock-time::before {
        background:
          radial-gradient(circle at 50% 50%, rgba(var(--purple-rgb), calc(var(--aod-halo-strength) * 0.72)), transparent 32%),
          radial-gradient(circle at 50% 50%, rgba(var(--cyan-rgb), calc(var(--aod-halo-strength) * 0.62)), transparent 46%);
        transform: scale(var(--aod-halo-scale));
        filter: blur(var(--clock-halo-blur));
        opacity: 0.9;
      }

      .clock-time::after {
        border-radius: 50%;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.02),
          0 0 80px rgba(var(--purple-rgb), calc(var(--aod-halo-strength) * 0.16));
        opacity: calc(var(--aod-halo-strength) * 1.1);
      }

      #fxCanvas {
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }

      .agent-layer {
        z-index: 3;
        opacity: var(--orb-alpha);
        pointer-events: none;
        will-change: opacity;
      }

      .agent-layer.is-interactive {
        pointer-events: auto;
      }

      .orb-shell {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 326px;
        height: 326px;
        transform:
          translate3d(-50%, calc(-50% + var(--orb-lift)), 0)
          scale(var(--orb-scale))
          rotateX(var(--orb-tilt-x))
          rotateY(var(--orb-tilt-y));
        transform-style: preserve-3d;
        will-change: transform;
        pointer-events: none;
        transition:
          opacity 280ms var(--ease-out-quart),
          filter 280ms var(--ease-out-quart);
      }

      .agent-layer[data-conversation-state="options"] .orb-shell,
      .agent-layer[data-conversation-state="confirmed"] .orb-shell {
        opacity: 0.42;
        filter: saturate(0.82) brightness(0.72);
      }

      .orb-aura,
      .orb-ring,
      .orb-core,
      .orb-liquid,
      .orb-highlight {
        position: absolute;
        inset: 0;
        border-radius: var(--orb-morph-a);
      }

      .orb-aura {
        inset: -16%;
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 50%, rgba(var(--cyan-rgb), calc(var(--orb-aura) * 0.34)), transparent 42%),
          radial-gradient(circle at 50% 50%, rgba(var(--purple-rgb), calc(var(--orb-aura) * 0.42)), transparent 66%);
        filter: blur(var(--orb-aura-blur));
        transform: translateZ(-20px) scale(1.08);
      }

      .orb-ring {
        inset: -6%;
        border-radius: 50%;
        border: 1px solid rgba(var(--ice-rgb), calc(var(--ring-alpha) + 0.03));
        box-shadow:
          0 0 0 1px rgba(var(--cyan-rgb), 0.08),
          0 0 60px rgba(var(--cyan-rgb), 0.12),
          inset 0 0 38px rgba(255, 255, 255, 0.08);
        opacity: 0.78;
      }

      .orb-core {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background:
          radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.2) 17%, transparent 34%),
          radial-gradient(circle at 72% 70%, rgba(var(--cyan-rgb), 0.22), transparent 44%),
          conic-gradient(
            from 215deg,
            rgba(var(--cyan-rgb), 0.9),
            rgba(24, 66, 255, 0.22) 22%,
            rgba(var(--purple-rgb), 0.8) 54%,
            rgba(18, 26, 84, 0.26) 78%,
            rgba(var(--cyan-rgb), 0.9)
          );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          inset 0 -20px 54px rgba(0, 0, 0, 0.2),
          0 28px 90px rgba(var(--purple-rgb), 0.16),
          0 18px 64px rgba(var(--cyan-rgb), 0.16);
        backdrop-filter: var(--orb-surface-backdrop);
      }

      .orb-liquid {
        inset: 5%;
        border-radius: var(--orb-morph-b);
        background:
          radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.54), transparent 24%),
          radial-gradient(circle at 64% 62%, rgba(var(--cyan-rgb), 0.18), transparent 28%),
          conic-gradient(
            from 40deg,
            rgba(255, 255, 255, 0.04),
            rgba(var(--purple-rgb), 0.28),
            rgba(var(--cyan-rgb), 0.16),
            rgba(255, 255, 255, 0.04)
          );
        mix-blend-mode: screen;
        filter: blur(var(--orb-liquid-blur)) saturate(138%);
        opacity: 0.92;
      }

      .orb-highlight {
        inset: 14%;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.16) 24%, transparent 56%),
          radial-gradient(circle at 68% 72%, rgba(var(--purple-rgb), 0.18), transparent 42%);
        transform: translate3d(var(--orb-highlight-shift-x), var(--orb-highlight-shift-y), 44px) rotate(var(--orb-sheen-rotate));
        filter: blur(var(--orb-highlight-blur));
        mix-blend-mode: screen;
      }

      .conversation-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
      }

      .conversation-bubble {
        position: absolute;
        left: 50%;
        top: 548px;
        width: min(760px, calc(100% - 112px));
        padding: 22px 28px 24px;
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.028)),
          rgba(8, 11, 24, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 22px 60px rgba(0, 0, 0, 0.34),
          0 0 40px rgba(var(--purple-rgb), 0.08);
        opacity: 0;
        transform: translate3d(-50%, 22px, 0);
        filter: blur(18px);
        will-change: transform, opacity, filter;
        pointer-events: none;
        transition:
          top 280ms var(--ease-out-quart),
          width 280ms var(--ease-out-quart);
      }

      .agent-layer[data-conversation-state="options"] .conversation-bubble,
      .agent-layer[data-conversation-state="confirmed"] .conversation-bubble {
        top: 148px;
        width: min(820px, calc(100% - 96px));
      }

      .conversation-text {
        margin: 0;
        font-size: 42px;
        font-weight: 300;
        line-height: 1.24;
        letter-spacing: -0.045em;
        color: rgba(238, 245, 255, 0.96);
      }

      .coffee-tray {
        position: absolute;
        left: 50%;
        top: 50%;
        bottom: auto;
        width: 980px;
        height: 580px;
        margin-top: -248px;
        opacity: 0;
        transform: translate3d(-50%, 28px, 0);
        filter: blur(18px);
        will-change: transform, opacity, filter;
        pointer-events: none;
      }

      .coffee-card {
        position: absolute;
        top: 18px;
        left: 50%;
        width: 640px;
        min-height: 408px;
        padding: 40px 44px 48px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 54px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
          rgba(6, 8, 18, 0.84);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 40px 96px rgba(0, 0, 0, 0.4);
        color: rgba(238, 246, 255, 0.92);
        text-align: left;
        cursor: default;
        opacity: 0;
        transform: translate3d(-50%, 26px, 0) scale(0.82);
        transition:
          border-color 180ms var(--ease-out-quart),
          box-shadow 180ms var(--ease-out-quart),
          background 180ms var(--ease-out-quart);
      }

      .coffee-card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background:
          radial-gradient(circle at 18% 18%, rgba(var(--cyan-rgb), 0.12), transparent 34%),
          radial-gradient(circle at 82% 22%, rgba(var(--purple-rgb), 0.1), transparent 38%);
        opacity: 0.82;
        pointer-events: none;
      }

      .coffee-card > * {
        position: relative;
        z-index: 1;
        display: block;
      }

      .coffee-card-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 176px;
        gap: 28px;
        align-items: start;
      }

      .coffee-card-copy {
        min-width: 0;
      }

      .coffee-card-index {
        margin-bottom: 28px;
        font-size: 18px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(var(--cyan-rgb), 0.7);
      }

      .coffee-card-title {
        font-size: 74px;
        font-weight: 300;
        line-height: 1.05;
        letter-spacing: -0.05em;
      }

      .coffee-card-meta {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .coffee-card-subtitle {
        margin-top: 0;
        font-size: 16px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(225, 235, 255, 0.44);
      }

      .coffee-card-price {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 90px;
        padding: 10px 16px;
        border-radius: 999px;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(242, 247, 255, 0.96);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05)),
          rgba(17, 22, 36, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.09);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 12px 28px rgba(0, 0, 0, 0.18);
      }

      .coffee-card-note {
        margin-top: 72px;
        font-size: 20px;
        line-height: 1.6;
        color: rgba(224, 236, 255, 0.72);
      }

      .coffee-card-visual {
        position: relative;
        width: 176px;
        height: 176px;
        align-self: start;
        justify-self: end;
        border-radius: 42px;
        background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.04), transparent 72%);
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      .coffee-card-visual::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.1), transparent 42%);
        pointer-events: none;
      }

      .coffee-card-visual svg {
        position: relative;
        z-index: 1;
        width: 132px;
        height: 132px;
        display: block;
      }

      .coffee-card[data-coffee-id="americano"] .coffee-card-visual {
        background: radial-gradient(circle at 50% 50%, rgba(var(--cyan-rgb), 0.07), transparent 72%);
      }

      .coffee-card[data-coffee-id="latte"] .coffee-card-visual {
        background: radial-gradient(circle at 50% 50%, rgba(255, 214, 160, 0.08), transparent 72%);
      }

      .coffee-card[data-coffee-id="flat-white"] .coffee-card-visual {
        background: radial-gradient(circle at 50% 50%, rgba(var(--purple-rgb), 0.08), transparent 72%);
      }

      .coffee-card.is-selected {
        border-color: rgba(var(--cyan-rgb), 0.42);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.14),
          0 42px 102px rgba(0, 0, 0, 0.42),
          0 0 56px rgba(var(--cyan-rgb), 0.2);
      }

      .coffee-card.is-confirmed {
        border-color: rgba(var(--cyan-rgb), 0.68);
        background:
          linear-gradient(180deg, rgba(var(--cyan-rgb), 0.16), rgba(255, 255, 255, 0.03)),
          rgba(7, 11, 22, 0.9);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.16),
          0 48px 112px rgba(0, 0, 0, 0.44),
          0 0 64px rgba(var(--cyan-rgb), 0.26);
      }

      .coffee-card:focus-visible {
        outline: none;
        border-color: rgba(var(--cyan-rgb), 0.72);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.16),
          0 0 0 2px rgba(var(--cyan-rgb), 0.24),
          0 24px 56px rgba(0, 0, 0, 0.34);
      }

      .payment-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      .payment-card {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 640px;
        min-height: 408px;
        padding: 40px 44px 48px;
        border-radius: 54px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.024)),
          rgba(7, 10, 20, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.09);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 28px 78px rgba(0, 0, 0, 0.36),
          0 0 44px rgba(var(--cyan-rgb), 0.08);
        opacity: 0;
        transform: none;
        filter: blur(18px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 32px;
        will-change: transform, opacity, filter;
      }

      .payment-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }

      .payment-chip {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04)),
          rgba(17, 21, 34, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .payment-chip-dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: rgba(var(--cyan-rgb), 0.76);
        box-shadow: 0 0 0 7px rgba(var(--cyan-rgb), 0.1);
      }

      .payment-chip-text {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(232, 242, 255, 0.76);
      }

      .payment-amount {
        font-size: 46px;
        font-weight: 300;
        letter-spacing: -0.05em;
        color: rgba(245, 248, 255, 0.96);
      }

      .payment-status {
        margin: 24px 0 0;
        font-size: 48px;
        font-weight: 300;
        line-height: 1.08;
        letter-spacing: -0.045em;
        color: rgba(241, 247, 255, 0.96);
      }

      .payment-detail {
        margin: 12px 0 0;
        font-size: 18px;
        line-height: 1.65;
        color: rgba(226, 236, 255, 0.68);
      }

      .payment-track {
        position: relative;
        overflow: hidden;
        height: 12px;
        margin-top: 28px;
        border-radius: 999px;
        background: rgba(21, 28, 46, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .payment-fill,
      .payment-glint {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: inherit;
      }

      .payment-fill {
        width: 100%;
        background: linear-gradient(90deg, rgba(var(--cyan-rgb), 0.88), rgba(var(--purple-rgb), 0.72));
        transform: scaleX(0);
        transform-origin: left center;
      }

      .payment-glint {
        width: 26%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.88), transparent);
        opacity: 0;
        transform: translateX(-140%);
      }

      .payment-success {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-top: 28px;
        opacity: 0;
        transform: translate3d(0, 10px, 0);
      }

      .payment-success-mark {
        position: relative;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(180deg, rgba(var(--cyan-rgb), 0.92), rgba(var(--purple-rgb), 0.82));
        box-shadow:
          0 12px 30px rgba(var(--cyan-rgb), 0.18),
          0 0 20px rgba(var(--purple-rgb), 0.14);
      }

      .payment-success-mark::before {
        content: "";
        position: absolute;
        left: 19px;
        top: 14px;
        width: 14px;
        height: 24px;
        border-right: 4px solid rgba(0, 0, 0, 0.76);
        border-bottom: 4px solid rgba(0, 0, 0, 0.76);
        transform: rotate(45deg);
      }

        color: rgba(0, 0, 0, 0.88);

    </style>

  <body>
    <div class="viewport-shell">

                </div>

          <section class="permission-overlay" id="permissionOverlay" aria-live="polite">
            <div class="permission-card">

              <p class="permission-detail" id="overlayDetail">
                授权前置摄像头后，外屏会在你注视时由待机时钟无缝唤醒为活跃 AI 智能体。
              </p>
              <button class="permission-button" id="permissionButton" type="button">点击开启 AI 感知</button>

          <video id="cameraFeed" autoplay muted playsinline></video>
        </main>

    <script type="text/plain" id="pose-worker-source">
import { FilesetResolver, FaceLandmarker, HandLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/+esm';

let faceLandmarker = null;
let handLandmarker = null;
let ready = false;
let config = null;

const handRuntime = {
  lastCenterX: 0,
  lastTimestamp: 0,
  lastSwipeAt: 0,
  pinchClosed: false,
  pinchStartedAt: 0,
  pinchLatched: false,
  missingFrames: 0,
  present: false,
  cached: null,
};

function toDegrees(radians) {
  return (radians * 180) / Math.PI;
}

const EYE_TRACKING = {
  right: { cornerA: 33, cornerB: 133, upperLid: 159, lowerLid: 145, irisCenter: 468 },
  left: { cornerA: 362, cornerB: 263, upperLid: 386, lowerLid: 374, irisCenter: 473 },
};

const HAND_POINTS = {
  wrist: 0,
  thumbTip: 4,
  indexMcp: 5,
  middleMcp: 9,
  ringMcp: 13,
  pinkyMcp: 17,
  indexTip: 8,
};

function midpoint(a, b) {
  return {
    x: (a.x + b.x) * 0.5,
    y: (a.y + b.y) * 0.5,
  };
}

function distance(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y);
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function blankHandState(supported) {
  return {
    supported: Boolean(supported),
    present: false,
    centerX: 0,
    velocityX: 0,
    swipeDirection: 0,
    pinchActive: false,
    pinchConfirmed: false,
  };
}

function resetHandRuntime(supported) {
  handRuntime.lastCenterX = 0;
  handRuntime.lastTimestamp = 0;
  handRuntime.lastSwipeAt = 0;
  handRuntime.pinchClosed = false;
  handRuntime.pinchStartedAt = 0;
  handRuntime.pinchLatched = false;
  handRuntime.missingFrames = 0;
  handRuntime.present = false;
  handRuntime.cached = blankHandState(supported);
  return handRuntime.cached;
}

function estimateEyeGaze(landmarks, config) {
  const cornerA = landmarks[config.cornerA];
  const cornerB = landmarks[config.cornerB];
  const upperLid = landmarks[config.upperLid];
  const lowerLid = landmarks[config.lowerLid];
  const irisCenter = landmarks[config.irisCenter];

  if (!cornerA || !cornerB || !upperLid || !lowerLid || !irisCenter) {
    return null;
  }

  const leftCorner = cornerA.x <= cornerB.x ? cornerA : cornerB;
  const rightCorner = cornerA.x <= cornerB.x ? cornerB : cornerA;
  const eyeWidth = distance(leftCorner, rightCorner);
  const lidGap = Math.max(distance(upperLid, lowerLid), eyeWidth * 0.16);

  if (!eyeWidth || !lidGap) {
    return null;
  }

  const eyeCenter = midpoint(leftCorner, rightCorner);
  const lidCenter = midpoint(upperLid, lowerLid);

  return {
    horizontal: clamp((irisCenter.x - eyeCenter.x) / (eyeWidth * 0.5), -1.4, 1.4),
    vertical: clamp((irisCenter.y - lidCenter.y) / (lidGap * 0.65), -1.4, 1.4),
    openness: clamp(lidGap / eyeWidth / 0.36, 0, 1.4),
  };
}

function extractGaze(landmarks) {
  if (!landmarks || landmarks.length < 474) {
    return {
      gazeYaw: 0,
      gazePitch: 0,
      gazeCentered: 0,
      gazeOpenness: 0,
      gazeValid: false,
    };
  }

  const samples = [
    estimateEyeGaze(landmarks, EYE_TRACKING.right),
    estimateEyeGaze(landmarks, EYE_TRACKING.left),
  ].filter(Boolean);

  const usable = samples.filter((sample) => sample.openness > 0.08);
  if (!usable.length) {
    return {
      gazeYaw: 0,
      gazePitch: 0,
      gazeCentered: 0,
      gazeOpenness: 0,
      gazeValid: false,
    };
  }

  const horizontal =
    usable.reduce((sum, sample) => sum + sample.horizontal, 0) / usable.length;
  const vertical =
    usable.reduce((sum, sample) => sum + sample.vertical, 0) / usable.length;
  const openness =
    usable.reduce((sum, sample) => sum + sample.openness, 0) / usable.length;
  const gazeYaw = horizontal * 18;
  const gazePitch = vertical * 16;
  const gazeCentered = 1 - clamp(Math.max(Math.abs(gazeYaw) / 18, Math.abs(gazePitch) / 16), 0, 1);

  return {
    gazeYaw,
    gazePitch,
    gazeCentered,
    gazeOpenness: openness,
    gazeValid: true,
  };
}

function enrichAttention(sample) {
  const headCentered = 1 - clamp(Math.max(Math.abs(sample.yaw) / 24, Math.abs(sample.pitch) / 22), 0, 1);
  const gazeCentered = sample.gazeValid ? sample.gazeCentered : headCentered * 0.28;
  const attentiveness = sample.gazeValid
    ? clamp(headCentered * 0.42 + gazeCentered * 0.58, 0, 1)
    : clamp(headCentered * 0.34, 0, 1);

  return {
    ...sample,
    headCentered,
    combinedYaw: sample.gazeValid ? sample.yaw * 0.45 + sample.gazeYaw * 0.95 : sample.yaw * 0.82,
    combinedPitch: sample.gazeValid ? sample.pitch * 0.45 + sample.gazePitch * 0.9 : sample.pitch * 0.82,
    attentiveness,
  };
}

function poseFromMatrix(data) {
  const forwardX = data[2];
  const forwardY = data[6];
  const forwardZ = data[10];
  const yaw = toDegrees(Math.atan2(forwardX, forwardZ));
  const pitch = toDegrees(Math.atan2(-forwardY, Math.hypot(forwardX, forwardZ)));
  return { yaw, pitch };
}

function extractPose(result) {
  const landmarks = result && result.faceLandmarks && result.faceLandmarks[0];
  const matrix = result && result.facialTransformationMatrixes && result.facialTransformationMatrixes[0];
  if (!result || !landmarks || !matrix || !matrix.data || matrix.data.length < 16) {
    return enrichAttention({
      facePresent: false,
      yaw: 0,
      pitch: 0,
      gazeYaw: 0,
      gazePitch: 0,
      gazeCentered: 0,
      gazeOpenness: 0,
      gazeValid: false,
      confidence: 0,
    });
  }

  const pose = poseFromMatrix(matrix.data);
  const gaze = extractGaze(landmarks);
  return enrichAttention({
    facePresent: true,
    yaw: pose.yaw,
    pitch: pose.pitch,
    gazeYaw: gaze.gazeYaw,
    gazePitch: gaze.gazePitch,
    gazeCentered: gaze.gazeCentered,
    gazeOpenness: gaze.gazeOpenness,
    gazeValid: gaze.gazeValid,
    confidence: gaze.gazeValid ? Math.max(0.8, gaze.gazeOpenness) : 0.72,
  });
}

function getPalmCenter(landmarks) {
  const points = [
    landmarks[HAND_POINTS.wrist],
    landmarks[HAND_POINTS.indexMcp],
    landmarks[HAND_POINTS.middleMcp],
    landmarks[HAND_POINTS.ringMcp],
    landmarks[HAND_POINTS.pinkyMcp],
  ].filter(Boolean);

  if (!points.length) {
    return null;
  }

  const sum = points.reduce(
    (acc, point) => {
      acc.x += point.x;
      acc.y += point.y;
      return acc;
    },
    { x: 0, y: 0 }
  );

  return {
    x: sum.x / points.length,
    y: sum.y / points.length,
  };
}

function extractHandGesture(result, timestamp, gestureEnabled, skipped) {
  const supported = Boolean(handLandmarker);

  if (!gestureEnabled || !supported) {
    return resetHandRuntime(supported);
  }

  if (skipped && handRuntime.cached) {
    return {
      ...handRuntime.cached,
      swipeDirection: 0,
      pinchConfirmed: false,
    };
  }

  const landmarks = result && result.landmarks && result.landmarks[0];
  if (!landmarks || !landmarks.length) {
    if (handRuntime.present && handRuntime.cached && handRuntime.missingFrames < 3) {
      handRuntime.missingFrames += 1;
      return {
        ...handRuntime.cached,
        swipeDirection: 0,
        pinchConfirmed: false,
      };
    }
    return resetHandRuntime(supported);
  }

  const palmCenter = getPalmCenter(landmarks);
  const thumbTip = landmarks[HAND_POINTS.thumbTip];
  const indexTip = landmarks[HAND_POINTS.indexTip];
  const indexMcp = landmarks[HAND_POINTS.indexMcp];
  const pinkyMcp = landmarks[HAND_POINTS.pinkyMcp];

  if (!palmCenter || !thumbTip || !indexTip || !indexMcp || !pinkyMcp) {
    if (handRuntime.present && handRuntime.cached && handRuntime.missingFrames < 3) {
      handRuntime.missingFrames += 1;
      return {
        ...handRuntime.cached,
        swipeDirection: 0,
        pinchConfirmed: false,
      };
    }
    return resetHandRuntime(supported);
  }

  const palmWidth = Math.max(distance(indexMcp, pinkyMcp), 0.045);
  const pinchDistance = distance(thumbTip, indexTip) / palmWidth;
  const dt = Math.max(timestamp - handRuntime.lastTimestamp, 1);
  const dx = palmCenter.x - handRuntime.lastCenterX;
  const velocityX = handRuntime.present ? (dx / dt) * 1000 : 0;
  let swipeDirection = 0;

  if (
    handRuntime.present &&
    !handRuntime.pinchClosed &&
    Math.abs(dx) > config.handGesture.swipeDisplacementThreshold &&
    Math.abs(velocityX) > config.handGesture.swipeVelocityThreshold &&
    timestamp - handRuntime.lastSwipeAt > config.handGesture.swipeCooldownMs
  ) {
    swipeDirection = velocityX > 0 ? 1 : -1;
    handRuntime.lastSwipeAt = timestamp;
  }

  let pinchActive = handRuntime.pinchClosed
    ? pinchDistance < config.handGesture.pinchOpenThreshold
    : pinchDistance < config.handGesture.pinchCloseThreshold;
  let pinchConfirmed = false;

  if (pinchActive && !handRuntime.pinchClosed) {
    handRuntime.pinchStartedAt = timestamp;
    handRuntime.pinchLatched = false;
  }

  if (
    pinchActive &&
    handRuntime.pinchStartedAt &&
    !handRuntime.pinchLatched &&
    timestamp - handRuntime.pinchStartedAt >= config.handGesture.pinchHoldMs
  ) {
    pinchConfirmed = true;
    handRuntime.pinchLatched = true;
  }

  if (!pinchActive) {
    handRuntime.pinchClosed = false;
    handRuntime.pinchStartedAt = 0;
    handRuntime.pinchLatched = false;
  } else {
    handRuntime.pinchClosed = true;
  }

  handRuntime.missingFrames = 0;
  handRuntime.lastCenterX = palmCenter.x;
  handRuntime.lastTimestamp = timestamp;
  handRuntime.present = true;
  handRuntime.cached = {
    supported: true,
    present: true,
    centerX: palmCenter.x,
    velocityX,
    swipeDirection: 0,
    pinchActive,
    pinchConfirmed: false,
  };

  return {
    supported: true,
    present: true,
    centerX: palmCenter.x,
    velocityX,
    swipeDirection,
    pinchActive,
    pinchConfirmed,
  };
}

self.onmessage = async (event) => {
  const payload = event.data || {};

  if (payload.type === 'init') {
    try {
      config = payload.config;
      const vision = await FilesetResolver.forVisionTasks(config.wasmUrl);
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: config.modelUrl,
          delegate: 'CPU',
        },
        runningMode: 'VIDEO',
        numFaces: 1,
        minFaceDetectionConfidence: 0.5,
        minFacePresenceConfidence: 0.5,
        minTrackingConfidence: 0.5,
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: true,
      });

      handLandmarker = null;
      resetHandRuntime(false);
      ready = true;
      self.postMessage({
        type: 'pose',
        ready: true,
        facePresent: false,
        yaw: 0,
        pitch: 0,
        gazeYaw: 0,
        gazePitch: 0,
        gazeCentered: 0,
        gazeOpenness: 0,
        gazeValid: false,
        combinedYaw: 0,
        combinedPitch: 0,
        attentiveness: 0,
        confidence: 0,
        hand: blankHandState(false),
        handAvailable: false,
        timestamp: performance.now(),
      });
    } catch (error) {
      self.postMessage({
        type: 'error',
        message: error instanceof Error ? error.message : 'Pose worker init failed',
      });
    }
    return;
  }

  if (payload.type === 'dispose') {
    ready = false;
    if (faceLandmarker && typeof faceLandmarker.close === 'function') {
      try {
        faceLandmarker.close();
      } catch (_error) {
      }
    }
    if (handLandmarker && typeof handLandmarker.close === 'function') {
      try {
        handLandmarker.close();
      } catch (_error) {
      }
    }
    faceLandmarker = null;
    handLandmarker = null;
    resetHandRuntime(false);
    return;
  }

  if (payload.type !== 'frame') {
    return;
  }

  const imageBitmap = payload.imageBitmap;
  const timestamp = payload.timestamp;
  const gestureEnabled = Boolean(payload.gestureEnabled);
  const faceEnabled = payload.faceEnabled !== false;

  if (!ready || !faceLandmarker || !imageBitmap) {
    if (imageBitmap && typeof imageBitmap.close === 'function') {
      imageBitmap.close();
    }
    return;
  }

  try {
    const faceResult = faceEnabled ? faceLandmarker.detectForVideo(imageBitmap, timestamp) : null;
    let handResult = null;

    if (gestureEnabled && handLandmarker) {
      try {
        handResult = handLandmarker.detectForVideo(imageBitmap, timestamp);
      } catch (_error) {
        try {
          handLandmarker.close();
        } catch (_closeError) {
        }
        handLandmarker = null;
        resetHandRuntime(false);
      }
    } else if (!gestureEnabled) {
      resetHandRuntime(Boolean(handLandmarker));
    }

    if (typeof imageBitmap.close === 'function') {
      imageBitmap.close();
    }
    const pose = faceEnabled
      ? extractPose(faceResult)
      : {
          facePresent: false,
          yaw: 0,
          pitch: 0,
          gazeYaw: 0,
          gazePitch: 0,
          gazeCentered: 0,
          gazeOpenness: 0,
          gazeValid: false,
          headCentered: 0,
          combinedYaw: 0,
          combinedPitch: 0,
          attentiveness: 0,
          confidence: 0,
        };
    const hand = extractHandGesture(handResult, timestamp, gestureEnabled, false);
    self.postMessage({
      type: 'pose',
      ready: true,
      facePresent: pose.facePresent,
      yaw: pose.yaw,
      pitch: pose.pitch,
      gazeYaw: pose.gazeYaw,
      gazePitch: pose.gazePitch,
      gazeCentered: pose.gazeCentered,
      gazeOpenness: pose.gazeOpenness,
      gazeValid: pose.gazeValid,
      combinedYaw: pose.combinedYaw,
      combinedPitch: pose.combinedPitch,
      attentiveness: pose.attentiveness,
      confidence: pose.confidence,
      hand,
      handAvailable: Boolean(handLandmarker),
      timestamp,
    });
