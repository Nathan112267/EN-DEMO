<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pura X | AI 觉醒</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Sora:wght@200;300;400;500;600;700&display=swap");

      :root {
        color-scheme: dark;
        --stage-size: 980px;
        --stage-scale: 1;
        --cyan-rgb: 103, 255, 245;
        --purple-rgb: 154, 94, 255;
        --ice-rgb: 209, 255, 255;
        --ink-rgb: 1, 4, 14;
        --overlay-opacity: 1;
        --clock-alpha: 1;
        --clock-scale: 1;
        --clock-shift-y: 0px;
        --clock-blur: 0px;
        --aod-halo-strength: 0.26;
        --aod-halo-scale: 1;
        --orb-alpha: 0;
        --orb-scale: 0.8;
        --orb-tilt-x: 0deg;
        --orb-tilt-y: 0deg;
        --orb-aura: 0.12;
        --orb-highlight-shift-x: 0px;
        --orb-highlight-shift-y: 0px;
        --orb-sheen-rotate: 0deg;
        --orb-morph-a: 44% 56% 52% 48% / 44% 38% 62% 56%;
        --orb-morph-b: 58% 42% 46% 54% / 58% 63% 37% 42%;
        --ring-alpha: 0.08;
        --permission-pointer: auto;
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
        color: rgb(var(--ice-rgb));
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Sora", "Noto Sans SC", sans-serif;
      }

      .viewport-shell {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 14%, rgba(var(--purple-rgb), 0.1), transparent 36%),
          radial-gradient(circle at 50% 86%, rgba(var(--cyan-rgb), 0.08), transparent 42%),
          #000;
      }

      .device-stage {
        position: relative;
        width: var(--stage-size);
        height: var(--stage-size);
        overflow: hidden;
        background:
          radial-gradient(circle at 48% 48%, rgba(7, 10, 28, 0.72), rgba(0, 0, 0, 0.96) 60%),
          #000;
        border-radius: 58px;
        transform: scale(var(--stage-scale));
        transform-origin: center center;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 34px 130px rgba(0, 0, 0, 0.6);
        isolation: isolate;
      }

      .device-stage::before,
      .device-stage::after {
        content: "";
        position: absolute;
        inset: -18%;
        pointer-events: none;
      }

      .device-stage::before {
        background:
          radial-gradient(circle at 21% 18%, rgba(var(--cyan-rgb), 0.18), transparent 28%),
          radial-gradient(circle at 79% 18%, rgba(var(--purple-rgb), 0.16), transparent 30%),
          radial-gradient(circle at 50% 86%, rgba(var(--cyan-rgb), 0.1), transparent 32%);
        opacity: 0.52;
        filter: blur(80px);
      }

      .device-stage::after {
        background:
          linear-gradient(140deg, rgba(var(--cyan-rgb), 0.09), transparent 24%),
          linear-gradient(315deg, rgba(var(--purple-rgb), 0.1), transparent 28%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0));
        mix-blend-mode: screen;
        opacity: 0.8;
      }

      .aod-layer,
      #fxCanvas,
      .agent-layer,
      .permission-overlay {
        position: absolute;
        inset: 0;
      }

      .aod-layer {
        display: grid;
        place-items: center;
      }

      .aod-layer::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(var(--cyan-rgb), 0.025), transparent 24%),
          linear-gradient(315deg, rgba(var(--purple-rgb), 0.028), transparent 28%);
        opacity: 0.9;
      }

      .clock-wrap {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        width: 100%;
        opacity: var(--clock-alpha);
        transform: translate3d(0, var(--clock-shift-y), 0) scale(var(--clock-scale));
        filter: blur(var(--clock-blur));
        will-change: transform, opacity, filter;
      }

      .clock-time {
        position: relative;
        font-size: clamp(230px, 25vw, 278px);
        font-weight: 200;
        line-height: 0.9;
        letter-spacing: -0.085em;
        color: rgba(236, 247, 255, 0.94);
        text-shadow:
          0 0 22px rgba(255, 255, 255, 0.09),
          0 0 42px rgba(var(--cyan-rgb), 0.05);
        user-select: none;
      }

      .clock-time::before,
      .clock-time::after {
        content: "";
        position: absolute;
        inset: -180px -140px;
        pointer-events: none;
      }

      .clock-time::before {
        background:
          radial-gradient(circle at 50% 50%, rgba(var(--purple-rgb), calc(var(--aod-halo-strength) * 0.72)), transparent 32%),
          radial-gradient(circle at 50% 50%, rgba(var(--cyan-rgb), calc(var(--aod-halo-strength) * 0.62)), transparent 46%);
        transform: scale(var(--aod-halo-scale));
        filter: blur(58px);
        opacity: 0.9;
      }

      .clock-time::after {
        border-radius: 50%;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.02),
          0 0 80px rgba(var(--purple-rgb), calc(var(--aod-halo-strength) * 0.16));
        opacity: calc(var(--aod-halo-strength) * 1.1);
      }

      #fxCanvas {
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 2;
      }

      .agent-layer {
        z-index: 3;
        opacity: var(--orb-alpha);
        pointer-events: none;
        will-change: opacity;
      }

      .orb-shell {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 326px;
        height: 326px;
        transform:
          translate3d(-50%, -50%, 0)
          scale(var(--orb-scale))
          rotateX(var(--orb-tilt-x))
          rotateY(var(--orb-tilt-y));
        transform-style: preserve-3d;
        will-change: transform;
      }

      .orb-aura,
      .orb-ring,
      .orb-core,
      .orb-liquid,
      .orb-highlight {
        position: absolute;
        inset: 0;
        border-radius: var(--orb-morph-a);
      }

      .orb-aura {
        inset: -16%;
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 50%, rgba(var(--cyan-rgb), calc(var(--orb-aura) * 0.34)), transparent 42%),
          radial-gradient(circle at 50% 50%, rgba(var(--purple-rgb), calc(var(--orb-aura) * 0.42)), transparent 66%);
        filter: blur(48px);
        transform: translateZ(-20px) scale(1.08);
      }

      .orb-ring {
        inset: -6%;
        border-radius: 50%;
        border: 1px solid rgba(var(--ice-rgb), calc(var(--ring-alpha) + 0.03));
        box-shadow:
          0 0 0 1px rgba(var(--cyan-rgb), 0.08),
          0 0 60px rgba(var(--cyan-rgb), 0.12),
          inset 0 0 38px rgba(255, 255, 255, 0.08);
        opacity: 0.78;
      }

      .orb-core {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background:
          radial-gradient(circle at 28% 22%, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.2) 17%, transparent 34%),
          radial-gradient(circle at 72% 70%, rgba(var(--cyan-rgb), 0.22), transparent 44%),
          conic-gradient(
            from 215deg,
            rgba(var(--cyan-rgb), 0.9),
            rgba(24, 66, 255, 0.22) 22%,
            rgba(var(--purple-rgb), 0.8) 54%,
            rgba(18, 26, 84, 0.26) 78%,
            rgba(var(--cyan-rgb), 0.9)
          );
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.2),
          inset 0 -20px 54px rgba(0, 0, 0, 0.2),
          0 28px 90px rgba(var(--purple-rgb), 0.16),
          0 18px 64px rgba(var(--cyan-rgb), 0.16);
        backdrop-filter: blur(22px) saturate(150%);
      }

      .orb-liquid {
        inset: 5%;
        border-radius: var(--orb-morph-b);
        background:
          radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.54), transparent 24%),
          radial-gradient(circle at 64% 62%, rgba(var(--cyan-rgb), 0.18), transparent 28%),
          conic-gradient(
            from 40deg,
            rgba(255, 255, 255, 0.04),
            rgba(var(--purple-rgb), 0.28),
            rgba(var(--cyan-rgb), 0.16),
            rgba(255, 255, 255, 0.04)
          );
        mix-blend-mode: screen;
        filter: blur(18px) saturate(138%);
        opacity: 0.92;
      }

      .orb-highlight {
        inset: 14%;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.88), rgba(255, 255, 255, 0.16) 24%, transparent 56%),
          radial-gradient(circle at 68% 72%, rgba(var(--purple-rgb), 0.18), transparent 42%);
        transform: translate3d(var(--orb-highlight-shift-x), var(--orb-highlight-shift-y), 44px) rotate(var(--orb-sheen-rotate));
        filter: blur(6px);
        mix-blend-mode: screen;
      }

      .permission-overlay {
        z-index: 4;
        display: grid;
        place-items: center;
        padding: 44px;
        opacity: var(--overlay-opacity);
        pointer-events: var(--permission-pointer);
        transition: opacity 220ms var(--ease-out-quart);
      }

      .permission-overlay.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .permission-overlay::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(22px) saturate(110%);
      }

      .permission-card {
        position: relative;
        width: min(100%, 430px);
        padding: 30px 30px 28px;
        border-radius: 34px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.025)),
          rgba(5, 8, 18, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.12),
          0 28px 80px rgba(0, 0, 0, 0.42),
          0 0 60px rgba(var(--purple-rgb), 0.08);
      }

      .permission-kicker {
        margin: 0 0 14px;
        font-size: 13px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(var(--cyan-rgb), 0.74);
      }

      .permission-title {
        margin: 0;
        font-size: 34px;
        font-weight: 300;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .permission-detail {
        margin: 14px 0 0;
        font-size: 15px;
        line-height: 1.7;
        color: rgba(226, 236, 255, 0.72);
      }

      .permission-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 220px;
        margin-top: 24px;
        padding: 14px 22px;
        border: 0;
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(var(--cyan-rgb), 0.92), rgba(var(--purple-rgb), 0.9));
        color: rgba(0, 0, 0, 0.88);
        font: inherit;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;
        box-shadow:
          0 18px 36px rgba(var(--purple-rgb), 0.18),
          0 0 24px rgba(var(--cyan-rgb), 0.2);
        transition:
          transform 180ms var(--ease-out-quart),
          box-shadow 180ms var(--ease-out-quart),
          filter 180ms var(--ease-out-quart);
      }

      .permission-button:hover {
        transform: translateY(-2px) scale(1.02);
        box-shadow:
          0 20px 40px rgba(var(--purple-rgb), 0.22),
          0 0 28px rgba(var(--cyan-rgb), 0.24);
      }

      .permission-button:active {
        transform: translateY(0) scale(0.98);
      }

      .permission-button:disabled {
        cursor: wait;
        filter: saturate(0.8);
        transform: none;
      }

      #cameraFeed {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      @media (max-width: 1100px) {
        .device-stage {
          border-radius: 44px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        :root {
          --aod-halo-strength: 0.16;
        }

        .permission-overlay,
        .permission-button {
          transition-duration: 0.01ms;
        }
      }
    </style>
  </head>
  <body>
    <div class="viewport-shell">
      <main class="device-stage" id="deviceStage" data-phase="permission">
        <section class="aod-layer" aria-label="Always-on display clock">
          <div class="clock-wrap" id="clockWrap">
            <div class="clock-time" id="clockTime">00:00</div>
          </div>
        </section>

        <canvas id="fxCanvas" width="980" height="980" aria-hidden="true"></canvas>

        <section class="agent-layer" id="agentLayer" aria-hidden="true">
          <div class="orb-shell" id="orbShell">
            <div class="orb-aura" id="orbAura"></div>
            <div class="orb-ring" id="orbRing"></div>
            <div class="orb-core" id="orbCore"></div>
            <div class="orb-liquid" id="orbLiquid"></div>
            <div class="orb-highlight" id="orbHighlight"></div>
          </div>
        </section>

        <section class="permission-overlay" id="permissionOverlay" aria-live="polite">
          <div class="permission-card">
            <p class="permission-kicker">Huawei Pura X / AI 觉醒</p>
            <h1 class="permission-title" id="overlayTitle">点击开启 AI 感知</h1>
            <p class="permission-detail" id="overlayDetail">
              授权前置摄像头后，外屏会在你注视时由待机时钟无缝唤醒为活跃 AI 智能体。
            </p>
            <button class="permission-button" id="permissionButton" type="button">点击开启 AI 感知</button>
          </div>
        </section>

        <video id="cameraFeed" autoplay muted playsinline></video>
      </main>
    </div>

    <script type="text/plain" id="pose-worker-source">
import { FilesetResolver, FaceLandmarker } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/+esm';

let landmarker = null;
let ready = false;
let config = null;

function toDegrees(radians) {
  return (radians * 180) / Math.PI;
}

function poseFromMatrix(data) {
  const forwardX = data[2];
  const forwardY = data[6];
  const forwardZ = data[10];
  const yaw = toDegrees(Math.atan2(forwardX, forwardZ));
  const pitch = toDegrees(Math.atan2(-forwardY, Math.hypot(forwardX, forwardZ)));
  return { yaw, pitch };
}

function extractPose(result) {
  const matrix = result && result.facialTransformationMatrixes && result.facialTransformationMatrixes[0];
  if (!result || !result.faceLandmarks || !result.faceLandmarks.length || !matrix || !matrix.data || matrix.data.length < 16) {
    return {
      facePresent: false,
      yaw: 0,
      pitch: 0,
      confidence: 0,
    };
  }

  const pose = poseFromMatrix(matrix.data);
  return {
    facePresent: true,
    yaw: pose.yaw,
    pitch: pose.pitch,
    confidence: 1,
  };
}

self.onmessage = async (event) => {
  const payload = event.data || {};

  if (payload.type === 'init') {
    try {
      config = payload.config;
      const vision = await FilesetResolver.forVisionTasks(config.wasmUrl);
      landmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: config.modelUrl,
          delegate: 'CPU',
        },
        runningMode: 'VIDEO',
        numFaces: 1,
        minFaceDetectionConfidence: 0.5,
        minFacePresenceConfidence: 0.5,
        minTrackingConfidence: 0.5,
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: true,
      });
      ready = true;
      self.postMessage({
        type: 'pose',
        ready: true,
        facePresent: false,
        yaw: 0,
        pitch: 0,
        confidence: 0,
        timestamp: performance.now(),
      });
    } catch (error) {
      self.postMessage({
        type: 'error',
        message: error instanceof Error ? error.message : 'Pose worker init failed',
      });
    }
    return;
  }

  if (payload.type === 'dispose') {
    ready = false;
    if (landmarker && typeof landmarker.close === 'function') {
      try {
        landmarker.close();
      } catch (_error) {
      }
    }
    landmarker = null;
    return;
  }

  if (payload.type !== 'frame') {
    return;
  }

  const imageBitmap = payload.imageBitmap;
  const timestamp = payload.timestamp;

  if (!ready || !landmarker || !imageBitmap) {
    if (imageBitmap && typeof imageBitmap.close === 'function') {
      imageBitmap.close();
    }
    return;
  }

  try {
    const result = landmarker.detectForVideo(imageBitmap, timestamp);
    if (typeof imageBitmap.close === 'function') {
      imageBitmap.close();
    }
    const pose = extractPose(result);
    self.postMessage({
      type: 'pose',
      ready: true,
      facePresent: pose.facePresent,
      yaw: pose.yaw,
      pitch: pose.pitch,
      confidence: pose.confidence,
      timestamp,
    });
  } catch (error) {
    if (typeof imageBitmap.close === 'function') {
      imageBitmap.close();
    }
    self.postMessage({
      type: 'error',
      message: error instanceof Error ? error.message : 'Pose worker frame failed',
    });
  }
};
    </script>

    <script type="module">
      import { FilesetResolver, FaceLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/+esm";

      function deepFreeze(value) {
        if (!value || typeof value !== "object" || Object.isFrozen(value)) {
          return value;
        }

        Object.getOwnPropertyNames(value).forEach((key) => {
          deepFreeze(value[key]);
        });

        return Object.freeze(value);
      }

      const DEMO_CONFIG = deepFreeze({
        stageSize: 980,
        detectionFps: 10,
        particleCount: 500,
        thresholds: {
          attentiveDeg: 15,
          awayDeg: 30,
        },
        timings: {
          wakeHoldMs: 500,
          sleepHoldMs: 2000,
          wakingMs: 800,
          sleepingMs: 900,
        },
        smoothing: {
          poseAlpha: 0.22,
        },
        orb: {
          radius: 148,
          waveCount: 3,
        },
        mediaPipe: {
          wasmUrl: "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm",
          modelUrl:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        },
        colors: {
          cyan: "103, 255, 245",
          purple: "154, 94, 255",
          ice: "225, 245, 255",
        },
      });

      const ui = {
        stage: document.getElementById("deviceStage"),
        clockWrap: document.getElementById("clockWrap"),
        clockTime: document.getElementById("clockTime"),
        fxCanvas: document.getElementById("fxCanvas"),
        agentLayer: document.getElementById("agentLayer"),
        orbShell: document.getElementById("orbShell"),
        orbAura: document.getElementById("orbAura"),
        orbRing: document.getElementById("orbRing"),
        orbCore: document.getElementById("orbCore"),
        orbLiquid: document.getElementById("orbLiquid"),
        orbHighlight: document.getElementById("orbHighlight"),
        overlay: document.getElementById("permissionOverlay"),
        overlayTitle: document.getElementById("overlayTitle"),
        overlayDetail: document.getElementById("overlayDetail"),
        permissionButton: document.getElementById("permissionButton"),
        cameraFeed: document.getElementById("cameraFeed"),
        workerSource: document.getElementById("pose-worker-source"),
      };

      const fxContext = ui.fxCanvas.getContext("2d");
      const sampleCanvas = document.createElement("canvas");
      sampleCanvas.width = DEMO_CONFIG.stageSize;
      sampleCanvas.height = DEMO_CONFIG.stageSize;
      const sampleContext = sampleCanvas.getContext("2d", { willReadFrequently: true });

      const motion = {
        clockAlpha: 1,
        clockScale: 1,
        clockShiftY: 0,
        clockBlur: 0,
        haloStrength: 0.26,
        haloScale: 1,
        orbAlpha: 0,
        orbScale: 0.8,
        orbAura: 0.14,
        ringAlpha: 0.08,
        waveAlpha: 0,
      };

      const oscillators = {
        breathe: 0.5,
        morph: 0.4,
        shimmer: 0.3,
      };

      const state = {
        phase: "permission",
        clockValue: "00:00",
        renderRaf: 0,
        detectionTimer: 0,
        transitionTimer: 0,
        pointCache: new Map(),
        particleTransition: null,
        worker: null,
        workerUrl: "",
        workerReady: false,
        pipelineMode: "",
        fallbackLandmarker: null,
        capturePending: false,
        fallbackBusy: false,
        stream: null,
        permissionBusy: false,
        wakeCandidateSince: 0,
        sleepCandidateSince: 0,
        pose: {
          facePresent: false,
          yaw: 0,
          pitch: 0,
          confidence: 0,
          timestamp: 0,
        },
        smoothedPose: {
          facePresent: false,
          yaw: 0,
          pitch: 0,
          confidence: 0,
          timestamp: 0,
        },
        overlayMode: "permission",
        resumeHint: false,
        reduceMotion: window.matchMedia("(prefers-reduced-motion: reduce)").matches,
      };

      const motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function easeOutQuart(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function easeOutExpo(t) {
        return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
      }

      function easeInExpo(t) {
        return t === 0 ? 0 : Math.pow(2, 10 * t - 10);
      }

      function randomBetween(min, max) {
        return min + Math.random() * (max - min);
      }

      function rgba(rgb, alpha) {
        return "rgba(" + rgb + ", " + alpha + ")";
      }

      function formatTime(date) {
        const hours = String(date.getHours()).padStart(2, "0");
        const minutes = String(date.getMinutes()).padStart(2, "0");
        return hours + ":" + minutes;
      }

      function updateStageScale() {
        const padding = 36;
        const available = Math.min(window.innerWidth - padding, window.innerHeight - padding);
        const scale = clamp(available / DEMO_CONFIG.stageSize, 0.28, 1);
        document.documentElement.style.setProperty("--stage-scale", scale.toFixed(4));
      }

      function updateClock(force) {
        const nextValue = formatTime(new Date());
        if (!force && nextValue === state.clockValue) {
          return;
        }
        state.clockValue = nextValue;
        ui.clockTime.textContent = nextValue;
      }

      function setOverlay(mode, detail) {
        state.overlayMode = mode;
        ui.overlay.classList.remove("is-hidden");
        document.documentElement.style.setProperty("--overlay-opacity", "1");
        document.documentElement.style.setProperty("--permission-pointer", "auto");

        if (mode === "permission") {
          ui.overlayTitle.textContent = "点击开启 AI 感知";
          ui.overlayDetail.textContent =
            detail || "授权前置摄像头后，外屏会在你注视时由待机时钟无缝唤醒为活跃 AI 智能体。";
          ui.permissionButton.textContent = "点击开启 AI 感知";
          return;
        }

        if (mode === "resume") {
          ui.overlayTitle.textContent = "点击恢复 AI 感知";
          ui.overlayDetail.textContent = detail || "页面返回前台后已暂停外屏感知，点击后重新连接摄像头。";
          ui.permissionButton.textContent = "点击恢复 AI 感知";
          return;
        }

        ui.overlayTitle.textContent = "AI 感知未开启";
        ui.overlayDetail.textContent = detail || "摄像头未授权或模型尚未就绪，请重试。";
        ui.permissionButton.textContent = "重试开启";
      }

      function hideOverlay() {
        state.overlayMode = "hidden";
        ui.overlay.classList.add("is-hidden");
        document.documentElement.style.setProperty("--overlay-opacity", "0");
        document.documentElement.style.setProperty("--permission-pointer", "none");
      }

      function clearTransitionTimer() {
        if (!state.transitionTimer) {
          return;
        }
        window.clearTimeout(state.transitionTimer);
        state.transitionTimer = 0;
      }

      function setPhase(nextPhase) {
        state.phase = nextPhase;
        ui.stage.dataset.phase = nextPhase;
      }

      function sampleClockPoints(text) {
        const cacheKey = text + "|" + DEMO_CONFIG.particleCount;
        const cached = state.pointCache.get(cacheKey);
        if (cached) {
          return cached;
        }

        sampleContext.clearRect(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize);
        sampleContext.fillStyle = "#fff";
        sampleContext.textAlign = "center";
        sampleContext.textBaseline = "middle";

        let fontSize = 284;
        while (fontSize > 200) {
          sampleContext.font = "200 " + fontSize + 'px "Sora", "Noto Sans SC", sans-serif';
          if (sampleContext.measureText(text).width < DEMO_CONFIG.stageSize * 0.77) {
            break;
          }
          fontSize -= 8;
        }

        sampleContext.fillText(text, DEMO_CONFIG.stageSize * 0.5, DEMO_CONFIG.stageSize * 0.5 + fontSize * 0.015);

        const imageData = sampleContext.getImageData(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize).data;
        const candidates = [];
        const step = 4;
        for (let y = 0; y < DEMO_CONFIG.stageSize; y += step) {
          for (let x = 0; x < DEMO_CONFIG.stageSize; x += step) {
            const alpha = imageData[(y * DEMO_CONFIG.stageSize + x) * 4 + 3];
            if (alpha > 24) {
              candidates.push({ x, y });
            }
          }
        }

        const points = [];
        if (!candidates.length) {
          for (let index = 0; index < DEMO_CONFIG.particleCount; index += 1) {
            points.push({ x: DEMO_CONFIG.stageSize * 0.5, y: DEMO_CONFIG.stageSize * 0.5 });
          }
        } else {
          const stride = Math.max(1, Math.floor(candidates.length / DEMO_CONFIG.particleCount));
          let cursor = 0;
          for (let index = 0; index < DEMO_CONFIG.particleCount; index += 1) {
            const point = candidates[cursor % candidates.length];
            points.push({ x: point.x, y: point.y });
            cursor += stride;
          }
        }

        state.pointCache.set(cacheKey, points);
        return points;
      }

      function buildWakeParticles(text) {
        const centerX = DEMO_CONFIG.stageSize * 0.5;
        const centerY = DEMO_CONFIG.stageSize * 0.5;
        return sampleClockPoints(text).map((point) => {
          const angle = Math.atan2(point.y - centerY, point.x - centerX);
          const burstRadius = 22 + Math.random() * 52;
          return {
            startX: point.x,
            startY: point.y,
            midX: point.x + Math.cos(angle) * burstRadius + randomBetween(-18, 18),
            midY: point.y + Math.sin(angle) * burstRadius + randomBetween(-18, 18),
            endX: centerX + randomBetween(-42, 42),
            endY: centerY + randomBetween(-42, 42),
            size: randomBetween(1.2, 3.6),
            alpha: randomBetween(0.52, 0.96),
            tint: Math.random(),
            seed: Math.random() * Math.PI * 2,
          };
        });
      }

      function buildSleepParticles(text) {
        const centerX = DEMO_CONFIG.stageSize * 0.5;
        const centerY = DEMO_CONFIG.stageSize * 0.5;
        return sampleClockPoints(text).map((point) => {
          const angle = randomBetween(0, Math.PI * 2);
          const innerRadius = DEMO_CONFIG.orb.radius * randomBetween(0.12, 0.48);
          const outerRadius = DEMO_CONFIG.orb.radius * randomBetween(0.54, 1.06);
          return {
            startX: centerX + Math.cos(angle) * innerRadius + randomBetween(-18, 18),
            startY: centerY + Math.sin(angle) * innerRadius + randomBetween(-18, 18),
            midX: centerX + Math.cos(angle) * outerRadius,
            midY: centerY + Math.sin(angle) * outerRadius,
            endX: point.x,
            endY: point.y,
            size: randomBetween(1.2, 3.4),
            alpha: randomBetween(0.56, 0.98),
            tint: Math.random(),
            seed: Math.random() * Math.PI * 2,
          };
        });
      }

      function startParticleTransition(kind, text) {
        if (state.reduceMotion) {
          state.particleTransition = null;
          return;
        }

        state.particleTransition = {
          kind,
          startAt: performance.now(),
          duration:
            kind === "wake" ? DEMO_CONFIG.timings.wakingMs : DEMO_CONFIG.timings.sleepingMs,
          particles: kind === "wake" ? buildWakeParticles(text) : buildSleepParticles(text),
        };
      }

      function completeWakeTransition() {
        state.particleTransition = null;
        setPhase("agent");
      }

      function completeSleepTransition() {
        state.particleTransition = null;
        setPhase("aod");
      }

      function triggerWake() {
        if (state.phase !== "aod") {
          return;
        }

        clearTransitionTimer();
        setPhase("waking");
        state.wakeCandidateSince = 0;
        state.sleepCandidateSince = 0;
        startParticleTransition("wake", state.clockValue);

        gsap.killTweensOf(motion);
        gsap.to(motion, {
          clockAlpha: 0,
          clockScale: state.reduceMotion ? 1.01 : 1.04,
          clockShiftY: -18,
          clockBlur: state.reduceMotion ? 2 : 22,
          haloStrength: 0.08,
          haloScale: state.reduceMotion ? 1.02 : 0.88,
          duration: state.reduceMotion ? 0.22 : 0.32,
          ease: "power2.out",
        });
        gsap.to(motion, {
          orbAlpha: 1,
          orbScale: 1,
          orbAura: state.reduceMotion ? 0.38 : 1,
          ringAlpha: state.reduceMotion ? 0.14 : 0.32,
          waveAlpha: 1,
          duration: state.reduceMotion ? 0.32 : 0.88,
          ease: "expo.out",
        });

        state.transitionTimer = window.setTimeout(() => {
          completeWakeTransition();
        }, state.reduceMotion ? 260 : DEMO_CONFIG.timings.wakingMs);
      }

      function triggerSleep() {
        if (state.phase !== "agent") {
          return;
        }

        clearTransitionTimer();
        setPhase("sleeping");
        state.wakeCandidateSince = 0;
        state.sleepCandidateSince = 0;
        startParticleTransition("sleep", state.clockValue);

        gsap.killTweensOf(motion);
        gsap.to(motion, {
          orbAlpha: 0,
          orbScale: state.reduceMotion ? 0.92 : 0.82,
          orbAura: 0.18,
          ringAlpha: 0.08,
          waveAlpha: 0,
          duration: state.reduceMotion ? 0.28 : 0.72,
          ease: "power2.inOut",
        });
        gsap.to(motion, {
          clockAlpha: 1,
          clockScale: 1,
          clockShiftY: 0,
          clockBlur: 0,
          haloStrength: state.reduceMotion ? 0.16 : 0.26,
          haloScale: 1,
          delay: state.reduceMotion ? 0.04 : 0.32,
          duration: state.reduceMotion ? 0.3 : 0.54,
          ease: "power3.out",
        });

        state.transitionTimer = window.setTimeout(() => {
          completeSleepTransition();
        }, state.reduceMotion ? 320 : DEMO_CONFIG.timings.sleepingMs);
      }

      function updateStateMachine(now) {
        const pose = state.smoothedPose;

        if (state.phase === "waking" || state.phase === "sleeping") {
          return;
        }

        const attentive =
          pose.facePresent &&
          Math.abs(pose.yaw) < DEMO_CONFIG.thresholds.attentiveDeg &&
          Math.abs(pose.pitch) < DEMO_CONFIG.thresholds.attentiveDeg;
        const away =
          !pose.facePresent ||
          Math.abs(pose.yaw) > DEMO_CONFIG.thresholds.awayDeg ||
          Math.abs(pose.pitch) > DEMO_CONFIG.thresholds.awayDeg;

        if (state.phase === "aod") {
          if (attentive) {
            if (!state.wakeCandidateSince) {
              state.wakeCandidateSince = now;
            }
            if (now - state.wakeCandidateSince >= DEMO_CONFIG.timings.wakeHoldMs) {
              triggerWake();
            }
          } else {
            state.wakeCandidateSince = 0;
          }
          return;
        }

        if (state.phase === "agent") {
          if (away) {
            if (!state.sleepCandidateSince) {
              state.sleepCandidateSince = now;
            }
            if (now - state.sleepCandidateSince >= DEMO_CONFIG.timings.sleepHoldMs) {
              triggerSleep();
            }
          } else {
            state.sleepCandidateSince = 0;
          }
        }
      }

      function processPoseSample(sample) {
        const timestamp = sample.timestamp || performance.now();
        state.pose = {
          facePresent: Boolean(sample.facePresent),
          yaw: sample.yaw || 0,
          pitch: sample.pitch || 0,
          confidence: sample.confidence || 0,
          timestamp,
        };

        if (state.pose.facePresent) {
          if (!state.smoothedPose.facePresent) {
            state.smoothedPose.facePresent = true;
            state.smoothedPose.yaw = state.pose.yaw;
            state.smoothedPose.pitch = state.pose.pitch;
            state.smoothedPose.confidence = state.pose.confidence;
          } else {
            state.smoothedPose.yaw = lerp(
              state.smoothedPose.yaw,
              state.pose.yaw,
              DEMO_CONFIG.smoothing.poseAlpha
            );
            state.smoothedPose.pitch = lerp(
              state.smoothedPose.pitch,
              state.pose.pitch,
              DEMO_CONFIG.smoothing.poseAlpha
            );
            state.smoothedPose.confidence = lerp(
              state.smoothedPose.confidence,
              state.pose.confidence,
              DEMO_CONFIG.smoothing.poseAlpha
            );
          }
        } else {
          state.smoothedPose.facePresent = false;
          state.smoothedPose.confidence = 0;
        }

        state.smoothedPose.timestamp = timestamp;
        updateStateMachine(performance.now());
      }

      function drawWaves(now) {
        if (motion.waveAlpha < 0.01) {
          return;
        }

        const centerX = DEMO_CONFIG.stageSize * 0.5;
        const centerY = DEMO_CONFIG.stageSize * 0.5;
        const yawInfluence = state.smoothedPose.facePresent ? state.smoothedPose.yaw / 30 : 0;
        const pitchInfluence = state.smoothedPose.facePresent ? state.smoothedPose.pitch / 30 : 0;

        fxContext.save();
        fxContext.globalCompositeOperation = "screen";
        fxContext.globalAlpha = clamp(motion.waveAlpha, 0, 1);

        for (let ringIndex = 0; ringIndex < DEMO_CONFIG.orb.waveCount; ringIndex += 1) {
          const baseRadius =
            DEMO_CONFIG.orb.radius +
            44 +
            ringIndex * 34 +
            oscillators.breathe * (state.reduceMotion ? 2 : 10);
          fxContext.beginPath();

          const steps = 110;
          for (let step = 0; step <= steps; step += 1) {
            const progress = step / steps;
            const angle = progress * Math.PI * 2;
            const lowWave =
              Math.sin(angle * (2.2 + ringIndex * 0.55) + now * 0.0017 * (1 + ringIndex * 0.12)) *
              (state.reduceMotion ? 3 : 8);
            const highWave =
              Math.sin(angle * 8.5 - now * 0.001 + ringIndex * 1.8) * (state.reduceMotion ? 1.2 : 3.6);
            const poseWarp =
              Math.cos(angle - yawInfluence * 1.3) * yawInfluence * 16 +
              Math.sin(angle + pitchInfluence * 1.1) * pitchInfluence * 12;
            const radius = baseRadius + lowWave + highWave + poseWarp;
            const x = centerX + Math.cos(angle) * radius;
            const y = centerY + Math.sin(angle) * radius * (0.95 + ringIndex * 0.02);

            if (step === 0) {
              fxContext.moveTo(x, y);
            } else {
              fxContext.lineTo(x, y);
            }
          }

          fxContext.closePath();
          fxContext.strokeStyle =
            ringIndex % 2 === 0
              ? rgba(DEMO_CONFIG.colors.cyan, 0.2 - ringIndex * 0.04)
              : rgba(DEMO_CONFIG.colors.purple, 0.18 - ringIndex * 0.04);
          fxContext.lineWidth = 1.25 - ringIndex * 0.18;
          fxContext.stroke();
        }

        fxContext.restore();
      }

      function drawParticles(now) {
        if (!state.particleTransition) {
          return;
        }

        const transition = state.particleTransition;
        const progress = clamp((now - transition.startAt) / transition.duration, 0, 1);

        fxContext.save();
        fxContext.globalCompositeOperation = "screen";

        transition.particles.forEach((particle) => {
          let x = particle.startX;
          let y = particle.startY;
          let alpha = particle.alpha;

          if (transition.kind === "wake") {
            if (progress < 0.22) {
              const explode = easeOutQuart(progress / 0.22);
              x = lerp(particle.startX, particle.midX, explode);
              y = lerp(particle.startY, particle.midY, explode);
            } else {
              const implode = easeInExpo((progress - 0.18) / 0.82);
              x = lerp(particle.midX, particle.endX, clamp(implode, 0, 1));
              y = lerp(particle.midY, particle.endY, clamp(implode, 0, 1));
              alpha *= lerp(1, 0.72, clamp(implode, 0, 1));
            }
          } else {
            if (progress < 0.26) {
              const bloom = easeOutQuart(progress / 0.26);
              x = lerp(particle.startX, particle.midX, bloom);
              y = lerp(particle.startY, particle.midY, bloom);
            } else {
              const settle = easeInOutCubic((progress - 0.16) / 0.84);
              x = lerp(particle.midX, particle.endX, clamp(settle, 0, 1));
              y = lerp(particle.midY, particle.endY, clamp(settle, 0, 1));
            }
            alpha *= lerp(1, 0.8, progress);
          }

          const flicker = 0.84 + Math.sin(now * 0.01 + particle.seed) * 0.16;
          const color =
            particle.tint < 0.55
              ? rgba(DEMO_CONFIG.colors.cyan, clamp(alpha * flicker, 0, 1))
              : rgba(DEMO_CONFIG.colors.purple, clamp(alpha * flicker, 0, 1));

          fxContext.fillStyle = color;
          fxContext.beginPath();
          fxContext.arc(x, y, particle.size, 0, Math.PI * 2);
          fxContext.fill();
        });

        fxContext.restore();

        if (progress >= 1) {
          state.particleTransition = null;
        }
      }

      function applyPresentation(now) {
        const breathe = state.reduceMotion ? oscillators.breathe * 0.18 : oscillators.breathe;
        const morph = state.reduceMotion ? oscillators.morph * 0.1 : oscillators.morph;
        const shimmer = state.reduceMotion ? oscillators.shimmer * 0.18 : oscillators.shimmer;
        const yaw = state.smoothedPose.facePresent ? state.smoothedPose.yaw : 0;
        const pitch = state.smoothedPose.facePresent ? state.smoothedPose.pitch : 0;
        const tiltX = clamp(-pitch * 0.52, -14, 14);
        const tiltY = clamp(yaw * 0.68, -16, 16);

        document.documentElement.style.setProperty("--clock-alpha", motion.clockAlpha.toFixed(3));
        document.documentElement.style.setProperty("--clock-scale", (motion.clockScale + breathe * 0.015).toFixed(3));
        document.documentElement.style.setProperty(
          "--clock-shift-y",
          (motion.clockShiftY + Math.sin(now * 0.0018) * (state.phase === "aod" ? 4 : 1.2)).toFixed(2) + "px"
        );
        document.documentElement.style.setProperty("--clock-blur", motion.clockBlur.toFixed(2) + "px");
        document.documentElement.style.setProperty(
          "--aod-halo-strength",
          (motion.haloStrength + breathe * (state.reduceMotion ? 0.01 : 0.05)).toFixed(3)
        );
        document.documentElement.style.setProperty(
          "--aod-halo-scale",
          (motion.haloScale + breathe * (state.reduceMotion ? 0.01 : 0.04)).toFixed(3)
        );
        document.documentElement.style.setProperty("--orb-alpha", motion.orbAlpha.toFixed(3));
        document.documentElement.style.setProperty(
          "--orb-scale",
          (motion.orbScale + breathe * (state.reduceMotion ? 0.012 : 0.05)).toFixed(3)
        );
        document.documentElement.style.setProperty(
          "--orb-tilt-x",
          (tiltX + Math.sin(now * 0.0015) * motion.orbAlpha * 1.4).toFixed(2) + "deg"
        );
        document.documentElement.style.setProperty(
          "--orb-tilt-y",
          (tiltY + Math.cos(now * 0.0011) * motion.orbAlpha * 1.8).toFixed(2) + "deg"
        );
        document.documentElement.style.setProperty("--orb-aura", motion.orbAura.toFixed(3));
        document.documentElement.style.setProperty(
          "--orb-highlight-shift-x",
          (Math.sin(now * 0.0013 + shimmer) * (state.reduceMotion ? 3 : 16)).toFixed(2) + "px"
        );
        document.documentElement.style.setProperty(
          "--orb-highlight-shift-y",
          (Math.cos(now * 0.0011 + shimmer) * (state.reduceMotion ? 2 : 11)).toFixed(2) + "px"
        );
        document.documentElement.style.setProperty("--orb-sheen-rotate", (shimmer * 14).toFixed(2) + "deg");
        document.documentElement.style.setProperty("--ring-alpha", motion.ringAlpha.toFixed(3));

        const morphA =
          44 + Math.sin(now * 0.0012) * 4 + morph * 5 + "% " +
          (56 - morph * 6) + "% " +
          (52 + Math.cos(now * 0.0011) * 5) + "% " +
          (48 - morph * 3) + "% / " +
          (44 + morph * 8) + "% " +
          (38 + Math.sin(now * 0.0009) * 6) + "% " +
          (62 - morph * 8) + "% " +
          (56 - Math.cos(now * 0.0013) * 5) + "%";
        const morphB =
          (58 - morph * 7) + "% " +
          (42 + Math.cos(now * 0.0014) * 4) + "% " +
          (46 + morph * 5) + "% " +
          (54 - Math.sin(now * 0.0015) * 4) + "% / " +
          (58 - Math.cos(now * 0.0012) * 6) + "% " +
          (63 - morph * 7) + "% " +
          (37 + morph * 7) + "% " +
          (42 + Math.sin(now * 0.0014) * 6) + "%";

        document.documentElement.style.setProperty("--orb-morph-a", morphA);
        document.documentElement.style.setProperty("--orb-morph-b", morphB);

        ui.orbLiquid.style.transform =
          "translate3d(" +
          (Math.sin(now * 0.001 + morph) * (state.reduceMotion ? 4 : 18)).toFixed(2) +
          "px, " +
          (Math.cos(now * 0.0012 + morph) * (state.reduceMotion ? 3 : 14)).toFixed(2) +
          "px, 38px) scale(" +
          (1.02 + morph * 0.08).toFixed(3) +
          ")";
      }

      function render(now) {
        fxContext.clearRect(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize);
        applyPresentation(now);
        drawWaves(now);
        drawParticles(now);
        state.renderRaf = window.requestAnimationFrame(render);
      }

      function startRenderLoop() {
        if (state.renderRaf) {
          return;
        }
        state.renderRaf = window.requestAnimationFrame(render);
      }

      function stopRenderLoop() {
        if (!state.renderRaf) {
          return;
        }
        window.cancelAnimationFrame(state.renderRaf);
        state.renderRaf = 0;
        fxContext.clearRect(0, 0, DEMO_CONFIG.stageSize, DEMO_CONFIG.stageSize);
      }

      function resetToAodVisualState() {
        gsap.killTweensOf(motion);
        motion.clockAlpha = 1;
        motion.clockScale = 1;
        motion.clockShiftY = 0;
        motion.clockBlur = 0;
        motion.haloStrength = state.reduceMotion ? 0.16 : 0.26;
        motion.haloScale = 1;
        motion.orbAlpha = 0;
        motion.orbScale = 0.8;
        motion.orbAura = 0.14;
        motion.ringAlpha = 0.08;
        motion.waveAlpha = 0;
      }

      async function waitForVideoMetadata(video) {
        if (video.readyState >= 1) {
          return;
        }
        await new Promise((resolve) => {
          video.addEventListener("loadedmetadata", resolve, { once: true });
        });
      }

      async function startCamera() {
        if (state.stream) {
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("当前环境不支持摄像头访问，请改用 localhost 或 HTTPS。");
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
        });

        state.stream = stream;
        ui.cameraFeed.srcObject = stream;
        await waitForVideoMetadata(ui.cameraFeed);
        await ui.cameraFeed.play();
      }

      function stopCamera() {
        if (!state.stream) {
          return;
        }
        state.stream.getTracks().forEach((track) => track.stop());
        state.stream = null;
        ui.cameraFeed.srcObject = null;
      }

      function disposeWorker() {
        if (state.worker) {
          try {
            state.worker.postMessage({ type: "dispose" });
          } catch (_error) {
          }
          state.worker.terminate();
        }
        if (state.workerUrl) {
          URL.revokeObjectURL(state.workerUrl);
        }
        state.worker = null;
        state.workerUrl = "";
        state.workerReady = false;
      }

      function disposeFallbackLandmarker() {
        if (state.fallbackLandmarker && typeof state.fallbackLandmarker.close === "function") {
          try {
            state.fallbackLandmarker.close();
          } catch (_error) {
          }
        }
        state.fallbackLandmarker = null;
      }

      function destroyPosePipeline() {
        disposeWorker();
        disposeFallbackLandmarker();
        state.pipelineMode = "";
        state.capturePending = false;
        state.fallbackBusy = false;
      }

      async function initFallbackLandmarker() {
        if (state.fallbackLandmarker) {
          state.pipelineMode = "main";
          return;
        }

        const vision = await FilesetResolver.forVisionTasks(DEMO_CONFIG.mediaPipe.wasmUrl);
        state.fallbackLandmarker = await FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: DEMO_CONFIG.mediaPipe.modelUrl,
            delegate: "CPU",
          },
          runningMode: "VIDEO",
          numFaces: 1,
          minFaceDetectionConfidence: 0.5,
          minFacePresenceConfidence: 0.5,
          minTrackingConfidence: 0.5,
          outputFaceBlendshapes: false,
          outputFacialTransformationMatrixes: true,
        });
        state.pipelineMode = "main";
      }

      function extractPoseFromMatrix(data) {
        const forwardX = data[2];
        const forwardY = data[6];
        const forwardZ = data[10];
        return {
          yaw: (Math.atan2(forwardX, forwardZ) * 180) / Math.PI,
          pitch: (Math.atan2(-forwardY, Math.hypot(forwardX, forwardZ)) * 180) / Math.PI,
        };
      }

      function extractFallbackPose(result) {
        const matrix = result?.facialTransformationMatrixes?.[0];
        if (!result?.faceLandmarks?.length || !matrix?.data?.length) {
          return {
            facePresent: false,
            yaw: 0,
            pitch: 0,
            confidence: 0,
          };
        }

        const pose = extractPoseFromMatrix(matrix.data);
        return {
          facePresent: true,
          yaw: pose.yaw,
          pitch: pose.pitch,
          confidence: 1,
        };
      }

      async function initWorkerPipeline() {
        const workerSource = ui.workerSource.textContent.trim();
        if (!workerSource) {
          throw new Error("Pose worker source missing");
        }

        const blob = new Blob([workerSource], { type: "text/javascript" });
        const workerUrl = URL.createObjectURL(blob);
        const worker = new Worker(workerUrl, { type: "module" });

        return await new Promise((resolve, reject) => {
          let settled = false;

          const finalizeResolve = () => {
            if (settled) {
              return;
            }
            settled = true;
            state.worker = worker;
            state.workerUrl = workerUrl;
            state.workerReady = true;
            state.pipelineMode = "worker";
            resolve();
          };

          const finalizeReject = (error) => {
            if (settled) {
              return;
            }
            settled = true;
            worker.terminate();
            URL.revokeObjectURL(workerUrl);
            reject(error);
          };

          worker.addEventListener("message", async (event) => {
            const message = event.data || {};
            if (message.type === "pose") {
              if (message.ready && !state.workerReady) {
                finalizeResolve();
                return;
              }
              state.capturePending = false;
              processPoseSample(message);
              return;
            }

            if (message.type === "error") {
              state.capturePending = false;
              if (!settled) {
                finalizeReject(new Error(message.message || "Pose worker init failed"));
                return;
              }
              try {
                await switchToFallback(message.message || "Pose worker runtime failed");
              } catch (error) {
                console.error(error);
                suspendExperience("AI 感知模型运行失败，请稍后重试。");
                setOverlay(
                  "error",
                  error instanceof Error ? error.message : "AI 感知模型运行失败，请稍后重试。"
                );
              }
            }
          });

          worker.addEventListener("error", (event) => {
            finalizeReject(new Error(event.message || "Pose worker crashed"));
          });

          worker.postMessage({
            type: "init",
            config: {
              wasmUrl: DEMO_CONFIG.mediaPipe.wasmUrl,
              modelUrl: DEMO_CONFIG.mediaPipe.modelUrl,
            },
          });
        });
      }

      async function ensurePosePipeline() {
        if (state.pipelineMode === "worker" && state.workerReady) {
          return;
        }
        if (state.pipelineMode === "main" && state.fallbackLandmarker) {
          return;
        }

        try {
          await initWorkerPipeline();
        } catch (workerError) {
          console.warn("Pose worker unavailable, falling back to main thread.", workerError);
          await initFallbackLandmarker();
        }
      }

      async function switchToFallback(reason) {
        console.warn("Switching pose detection to main thread.", reason);
        disposeWorker();
        await initFallbackLandmarker();
      }

      async function captureWorkerFrame() {
        if (!state.worker || !state.workerReady || state.capturePending) {
          return;
        }
        if (ui.cameraFeed.readyState < 2) {
          return;
        }

        state.capturePending = true;
        try {
          const frame = await createImageBitmap(ui.cameraFeed);
          state.worker.postMessage(
            {
              type: "frame",
              imageBitmap: frame,
              timestamp: performance.now(),
            },
            [frame]
          );
        } catch (error) {
          state.capturePending = false;
          await switchToFallback(error instanceof Error ? error.message : "Frame capture failed");
        }
      }

      async function captureFallbackPose() {
        if (!state.fallbackLandmarker || state.fallbackBusy) {
          return;
        }
        if (ui.cameraFeed.readyState < 2) {
          return;
        }

        state.fallbackBusy = true;
        try {
          const result = state.fallbackLandmarker.detectForVideo(ui.cameraFeed, performance.now());
          const sample = extractFallbackPose(result);
          processPoseSample({
            type: "pose",
            ready: true,
            facePresent: sample.facePresent,
            yaw: sample.yaw,
            pitch: sample.pitch,
            confidence: sample.confidence,
            timestamp: performance.now(),
          });
        } finally {
          state.fallbackBusy = false;
        }
      }

      function startDetectionLoop() {
        if (state.detectionTimer) {
          return;
        }

        const interval = Math.round(1000 / DEMO_CONFIG.detectionFps);
        state.detectionTimer = window.setInterval(() => {
          if (!state.stream) {
            return;
          }
          if (state.pipelineMode === "worker") {
            void captureWorkerFrame();
            return;
          }
          if (state.pipelineMode === "main") {
            void captureFallbackPose();
          }
        }, interval);
      }

      function stopDetectionLoop() {
        if (!state.detectionTimer) {
          return;
        }
        window.clearInterval(state.detectionTimer);
        state.detectionTimer = 0;
      }

      async function requestExperience() {
        if (state.permissionBusy) {
          return;
        }

        state.permissionBusy = true;
        ui.permissionButton.disabled = true;

        try {
          await startCamera();
          await ensurePosePipeline();
          startDetectionLoop();
          hideOverlay();
          resetToAodVisualState();
          state.resumeHint = false;
          setPhase("aod");
        } catch (error) {
          console.error(error);
          const message =
            error instanceof Error
              ? error.message
              : "摄像头或 AI 模型初始化失败，请确认当前环境支持 localhost 或 HTTPS。";
          setOverlay("error", message);
          setPhase("aod");
        } finally {
          state.permissionBusy = false;
          ui.permissionButton.disabled = false;
        }
      }

      function suspendExperience(detail) {
        clearTransitionTimer();
        stopDetectionLoop();
        destroyPosePipeline();
        stopCamera();
        state.capturePending = false;
        state.fallbackBusy = false;
        state.wakeCandidateSince = 0;
        state.sleepCandidateSince = 0;
        state.pose.facePresent = false;
        state.smoothedPose.facePresent = false;
        state.particleTransition = null;
        resetToAodVisualState();
        setPhase("aod");
        if (detail) {
          setOverlay("resume", detail);
          state.resumeHint = true;
        }
      }

      function handleVisibilityChange() {
        if (document.hidden) {
          stopRenderLoop();
          suspendExperience("页面切到后台后已暂停外屏感知，返回前台时点击恢复。");
          return;
        }

        startRenderLoop();
        if (state.resumeHint) {
          setOverlay("resume", "页面已回到前台，点击后重新连接摄像头并恢复 AI 感知。");
        }
      }

      function initialiseMotion() {
        gsap.to(oscillators, {
          breathe: 1,
          duration: 3.4,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });
        gsap.to(oscillators, {
          morph: 1,
          duration: 5.8,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });
        gsap.to(oscillators, {
          shimmer: 1,
          duration: 4.2,
          repeat: -1,
          yoyo: true,
          ease: "sine.inOut",
        });
      }

      function init() {
        if (!window.gsap) {
          setOverlay("error", "GSAP CDN 加载失败，请刷新页面后重试。");
          return;
        }

        updateStageScale();
        updateClock(true);
        resetToAodVisualState();
        initialiseMotion();
        startRenderLoop();

        ui.permissionButton.addEventListener("click", () => {
          void requestExperience();
        });

        window.setInterval(() => {
          updateClock();
        }, 1000);

        window.addEventListener("resize", updateStageScale, { passive: true });
        document.addEventListener("visibilitychange", handleVisibilityChange);
        window.addEventListener("pagehide", () => {
          stopRenderLoop();
          suspendExperience("");
        });
        window.addEventListener("beforeunload", () => {
          stopRenderLoop();
          suspendExperience("");
        });
        const handleMotionPreferenceChange = (event) => {
          state.reduceMotion = event.matches;
          resetToAodVisualState();
        };

        if (typeof motionQuery.addEventListener === "function") {
          motionQuery.addEventListener("change", handleMotionPreferenceChange);
        } else if (typeof motionQuery.addListener === "function") {
          motionQuery.addListener(handleMotionPreferenceChange);
        }

        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(() => {
            state.pointCache.clear();
          });
        }

        setOverlay("permission");
      }

      init();
    </script>
  </body>
</html>
