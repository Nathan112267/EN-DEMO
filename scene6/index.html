<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>Pura X · 硬件背触 AI选图</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
<style>
  :root {
    --canvas-w: 1600px;
    --canvas-h: 2560px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  html, body {
    width: 100%;
    height: 100%;
    background: #050506;
    font-family: "Inter", "Noto Sans SC", system-ui, -apple-system, "PingFang SC", sans-serif;
    color: #191714;
    overflow: hidden;
  }
  #stage {
    position: fixed;
    inset: 0;
    background: #050506;
    overflow: hidden;
  }
  #canvas {
    position: absolute;
    left: 50%;
    top: 50%;
    width: var(--canvas-w);
    height: var(--canvas-h);
    transform-origin: center center;
    overflow: hidden;
    background: #f5f3ee;
  }
  #app { position: absolute; inset: 0; }
</style>
</head>
<body>
<div id="stage">
  <div id="canvas">
    <div id="app"></div>
  </div>
</div>

<script>
  function fit() {
    const cv = document.getElementById("canvas");
    const sx = window.innerWidth / 1600;
    const sy = window.innerHeight / 2560;
    const s = Math.min(sx, sy);
    cv.style.transform = `translate(-50%, -50%) scale(${s})`;
  }
  window.addEventListener("resize", fit);
  fit();
</script>
<script type="module" src="./main.jsx"></script>
</body>
</html>
